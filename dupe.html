function pickWordPack(category = "ALL", hardWordsOn = false) {
  let pool = hardWordsOn ? WORD_PACKS : WORD_PACKS.filter(p => p.easy);
  if (category !== "ALL") pool = pool.filter(p => p.category === category);
  if (pool.length === 0) pool = WORD_PACKS.filter(p => p.easy); // fallback
  const pack = pool[Math.floor(Math.random() * pool.length)];
  return {
    category: pack.category,
    word: pack.word,
    decoy: pack.decoys[Math.floor(Math.random() * pack.decoys.length)],
  };
}

function generatePlayers(setup, dupeCount = 1) {
  const indices = [];
  while (indices.length < Math.min(dupeCount, setup.length - 1)) {
    const idx = Math.floor(Math.random() * setup.length);
    if (!indices.includes(idx)) indices.push(idx);
  }
  return setup.map((s, i) => ({
    id: i,
    name: s.name.toUpperCase().slice(0, 8),
    color: PLAYER_COLORS[s.colorIdx],
    animalId: s.animalId,
    accId: s.accId,
    isImposter: indices.includes(i),
    sus: 0,
    eliminated: false,
  }));
}

function defaultSetup(count) {
  const animals = ["fox","bear","rabbit","cat","wolf","panda","raccoon","owl"];
  return Array.from({ length: count }, (_, i) => ({
    name: NAMES[i],
    colorIdx: i,
    animalId: animals[i % animals.length],
    accId: "none",
  }));
}

function QRCanvas({ url, size = 160 }) {
  const ref = React.useRef();
  React.useEffect(() => {
    if(!ref.current) return;
    try {
      new window.QRious({
        element: ref.current,
        value: url,
        size: size,
        foreground: '#c8ff00',
        background: '#0d0d0d',
        level: 'M',
      });
    } catch(e) { console.error('QR error', e); }
  }, [url, size]);
  return <canvas ref={ref} />;
}

function DupeGame() {
  const [screen, setScreen] = useState("LOBBY");
  const [playerCount, setPlayerCount] = useState(5);
  const [selectedCategory, setSelectedCategory] = useState("ALL");
  const [hintsOn, setHintsOn] = useState(true);
  const [hardWordsOn, setHardWordsOn] = useState(false);
  const [gameMode, setGameMode] = useState("PASS");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [maxWrongSetting, setMaxWrongSetting] = useState(2);
  const [dupeCount, setDupeCount] = useState(1);
  const [playerSetup, setPlayerSetup] = useState(defaultSetup(5));
  const [editingPlayer, setEditingPlayer] = useState(null);
  const [editName, setEditName] = useState("");
  const [players, setPlayers] = useState([]);
  const [wordPack, setWordPack] = useState(null);
  const [round, setRound] = useState(1);
  const maxRounds = 4;
  const [viewingPlayer, setViewingPlayer] = useState(0);
  const [roleRevealed, setRoleRevealed] = useState(false);
  const [qrScanned, setQrScanned] = useState(0);
  const [votes, setVotes] = useState({});
  const [votingPlayer, setVotingPlayer] = useState(0);
  const [voteResult, setVoteResult] = useState(null);
  const [gameResult, setGameResult] = useState(null);
  const [wrongVotes, setWrongVotes] = useState(0);
  const [imposterGuess, setImposterGuess] = useState("");
  const [showGuess, setShowGuess] = useState(false);
  const [guessResult, setGuessResult] = useState(null);
  const [animateSus, setAnimateSus] = useState(null);
  const [revealing, setRevealing] = useState(false);
  const [cluePlayer, setCluePlayer] = useState(0);
  const [susMap, setSusMap] = useState({});
  const [activeSusser, setActiveSusser] = useState(null);

  const maxWrong = maxWrongSetting;
  const imposter = players.find(p => p.isImposter);
  const active = players.filter(p => !p.eliminated);

  // Count how many players are currently susing a given targetId
  function susCount(targetId) {
    return Object.values(susMap).filter(t => t === targetId).length;
  }


  function startGame() {
    const pack = pickWordPack(selectedCategory, hardWordsOn);
    setPlayers(generatePlayers(playerSetup, dupeCount)); setWordPack(pack);
    setRound(1); setWrongVotes(0); setVotes({}); setVoteResult(null);
    setGameResult(null); setViewingPlayer(0); setRoleRevealed(false); setQrScanned(0);
    setGuessResult(null); setShowGuess(false); setCluePlayer(0);
    setSusMap({}); setActiveSusser(null);
    setScreen("ROLE_REVEAL");
  }

  function selectSusser(playerId) {
    setActiveSusser(prev => prev === playerId ? null : playerId);
  }

  function placeSus(targetId) {
    if (activeSusser === null) return;
    if (activeSusser === targetId) return; // can't sus yourself
    setAnimateSus(targetId);
    setTimeout(() => setAnimateSus(null), 600);
    setSusMap(prev => ({ ...prev, [activeSusser]: targetId }));
    setActiveSusser(null);
  }

  const [peeking, setPeeking] = useState(false);

  function peek() {
    setPeeking(true);
    setTimeout(() => setPeeking(false), 2000);
  }

  function castVote(targetId) {
    const nv = {...votes, [votingPlayer]:targetId};
    setVotes(nv);
    if(votingPlayer < active.length - 1) { setVotingPlayer(v=>v+1); return; }
    setRevealing(true);
    setTimeout(() => {
      setRevealing(false);
      const tally = {};
      Object.values(nv).forEach(v => { tally[v]=(tally[v]||0)+1; });
      const maxV = Math.max(...Object.values(tally));
      const elim = parseInt(Object.keys(tally).find(k=>tally[k]===maxV));
      const ep = players.find(p=>p.id===elim);
      const updatedPlayers = players.map(p=>p.id===elim?{...p,eliminated:true}:p);
      const remainingDupes = updatedPlayers.filter(p=>p.isImposter&&!p.eliminated).length;
      setVoteResult({eliminatedId:elim, wasImposter:ep?.isImposter});
      if(ep?.isImposter && remainingDupes === 0) { setGameResult("BRIEFED_WIN"); setScreen("GAME_END"); }
      else if(ep?.isImposter) {
        // one dupe down but more remain — continue
        setPlayers(updatedPlayers);
        setScreen("VOTE_RESULT");
      }
      else {
        const nw = wrongVotes+1; setWrongVotes(nw);
        if(nw >= maxWrong || round >= maxRounds) { setGameResult("IMPOSTER_WINS_SURVIVAL"); setScreen("GAME_END"); }
        else setScreen("VOTE_RESULT");
      }
    }, 2200);
  }

  function tryGuess() {
    const ok = imposterGuess.trim().toUpperCase() === wordPack.word.toUpperCase();
    setGuessResult(ok ? "correct" : "wrong");
    if(ok) setTimeout(() => { setGameResult("IMPOSTER_WINS_GUESS"); setScreen("GAME_END"); }, 1200);
    else setTimeout(() => { setGuessResult(null); setShowGuess(false); setImposterGuess(""); }, 1500);
  }

  // ── HASH ROLE CARD — opens when player scans QR on their own phone ──────────
  const hashRole = (() => {
    try {
      const h = window.location.hash;
      if(!h.startsWith("#r=")) return null;
      return JSON.parse(atob(h.slice(3)));
    } catch { return null; }
  })();

  if(hashRole) {
    const { name, isDupe, category, word, hintsOn: hi } = hashRole;
    return (
      <div style={{
        minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",
        justifyContent:"center",padding:24,fontFamily:"sans-serif",
      }}>
        <style>{css}</style>
        <div style={{width:"100%",maxWidth:320,textAlign:"center"}}>
          <div className="mono" style={{fontSize:10,color:"#444",letterSpacing:"0.18em",marginBottom:8}}>YOUR ROLE</div>
          <div className="display" style={{
            fontSize:52,lineHeight:1,marginBottom:24,
            color: isDupe ? "#FF4545" : "#42D693",
          }}>
            {isDupe ? "DUPE" : "BRIEFED"}
          </div>
          <div style={{
            background: isDupe ? "#0d0808" : "#080f0a",
            border: `1px solid ${isDupe ? "#FF454555" : "#42D69355"}`,
            padding:"20px 24px",marginBottom:16,
          }}>
            <div className="mono" style={{fontSize:9,color:"#555",letterSpacing:"0.15em",marginBottom:6}}>
              {isDupe ? "YOUR WORD (decoy)" : "THE WORD"}
            </div>
            <div className="display" style={{fontSize:36,color: isDupe ? "#FF4545" : "#c8ff00",lineHeight:1}}>
              {isDupe ? (hi ? word : "???") : word}
            </div>
            <div className="mono" style={{fontSize:9,color:"#444",marginTop:8,letterSpacing:"0.1em"}}>CATEGORY: {category}</div>
          </div>
          {isDupe && (
            <div style={{background:"#100808",border:"1px dashed #2a1515",padding:"10px 14px",marginBottom:16}}>
              <div className="mono" style={{fontSize:11,color:"#FF454599",lineHeight:1.6}}>
                {hi ? "This is NOT their word — blend in." : "You have no hint. Listen carefully."}
              </div>
            </div>
          )}
          <div className="mono" style={{fontSize:10,color:"#333",letterSpacing:"0.1em",marginTop:20}}>
            close this tab when you've memorised your role
          </div>
        </div>
      </div>
    );
  }

  // ── LOBBY ──────────────────────────────────────────────
  if(screen==="LOBBY") return (
    <div className="dr noise-bg" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
      <style>{css}</style>
      <div className="fade-in" style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div className="display" style={{fontSize:100,lineHeight:0.9,color:"#e8e8e8"}}>DUPE</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:10}}>
            {[0,1,2].map(i=><div key={i} style={{width:5,height:5,background:"#c8ff00",clipPath:"polygon(50% 0%,100% 50%,50% 100%,0% 50%)"}} />)}
            <span className="mono" style={{fontSize:10,color:"#444",letterSpacing:"0.18em"}}>SOCIAL DEDUCTION</span>
            {[0,1,2].map(i=><div key={i} style={{width:5,height:5,background:"#c8ff00",clipPath:"polygon(50% 0%,100% 50%,50% 100%,0% 50%)"}} />)}
          </div>
        </div>

        <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",padding:"20px 22px",marginBottom:24}}>
          <SectionLabel>RULES</SectionLabel>
          {[
            ["01","Everyone sees the same word — except one Dupe"],
            ["02","The Dupe gets a similar but different word"],
            ["03","Take turns giving one-word clues. Everyone goes once per round"],
            ["04","After round 1 ends, you can call a vote to eliminate someone"],
            ["05","Wrong vote spends a chance. Dupe wins by surviving or guessing the real word"],
          ].map(([n,t])=>(
            <div key={n} style={{display:"flex",gap:14,marginBottom:7,alignItems:"flex-start"}}>
              <span className="mono" style={{fontSize:10,color:"#333",minWidth:18,paddingTop:1}}>{n}</span>
              <span style={{fontSize:13,color:"#777",lineHeight:1.55}}>{t}</span>
            </div>
          ))}
        </div>

        <div style={{marginBottom:24}}>
          <SectionLabel>NUMBER OF PLAYERS</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>
            {[3,4,5,6,7,8].map(n=>(
              <button key={n} onClick={()=>{
                setPlayerCount(n);
                setPlayerSetup(defaultSetup(n));
                setDupeCount(d => Math.min(d, Math.floor((n-1)/2)));
              }} style={{
                padding:"14px 0", background:playerCount===n?"#c8ff00":"#0d0d0d",
                color:playerCount===n?"#080808":"#555",
                border:`1px solid ${playerCount===n?"#c8ff00":"#222"}`,
                cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif", fontSize:24,
                transition:"all 0.15s",
              }}>{n}</button>
            ))}
          </div>
        </div>

        {/* Settings gear */}
        <div style={{marginBottom:24}}>
          <button onClick={()=>setSettingsOpen(o=>!o)} style={{
            display:"flex",alignItems:"center",gap:8,background:"transparent",
            border:"1px solid #222",padding:"8px 14px",cursor:"pointer",width:"100%",
            transition:"border-color 0.15s",
          }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#444"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#222"}
          >
            <span style={{fontSize:14}}>⚙</span>
            <span className="mono" style={{fontSize:10,color:"#555",letterSpacing:"0.12em",flex:1,textAlign:"left"}}>
              SETTINGS
            </span>
            <span className="mono" style={{fontSize:10,color:"#333",letterSpacing:"0.05em"}}>
              {selectedCategory !== "ALL" ? selectedCategory : "ALL"} · {hardWordsOn?"ALL WORDS":"EASY"} · HINTS {hintsOn?"ON":"OFF"} {settingsOpen?"▲":"▼"}
            </span>
          </button>

          {settingsOpen && (
            <div className="card-in" style={{border:"1px solid #1a1a1a",borderTop:"none",padding:"16px 14px",background:"#0a0a0a"}}>
              {/* Wrong votes allowed */}
              <div style={{marginBottom:18}}>
                <SectionLabel>WRONG VOTES ALLOWED</SectionLabel>
                <div style={{display:"flex",gap:6}}>
                  {[1,2,3,4].map(n=>(
                    <button key={n} onClick={()=>setMaxWrongSetting(n)} style={{
                      flex:1,padding:"10px 0",background:maxWrongSetting===n?"#c8ff00":"#0d0d0d",
                      color:maxWrongSetting===n?"#080808":"#555",
                      border:`1px solid ${maxWrongSetting===n?"#c8ff00":"#222"}`,
                      cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:22,
                      transition:"all 0.15s",
                    }}>{n}</button>
                  ))}
                </div>
              </div>

              {/* Dupe count */}
              <div style={{marginBottom:18}}>
                <SectionLabel>NUMBER OF DUPES</SectionLabel>
                <div style={{display:"flex",gap:6}}>
                  {[1,2,3].map(n=>{
                    const maxDupes = Math.floor((playerCount-1)/2);
                    const disabled = n > maxDupes;
                    return (
                      <button key={n} onClick={()=>!disabled&&setDupeCount(n)} style={{
                        flex:1,padding:"10px 0",background:dupeCount===n?"#FF4545":"#0d0d0d",
                        color:dupeCount===n?"#fff":disabled?"#2a2a2a":"#555",
                        border:`1px solid ${dupeCount===n?"#FF4545":disabled?"#1a1a1a":"#222"}`,
                        cursor:disabled?"default":"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:22,
                        transition:"all 0.15s",
                      }}>{n}</button>
                    );
                  })}
                </div>
                <div className="mono" style={{fontSize:9,color:"#333",marginTop:5,letterSpacing:"0.08em"}}>MAX {Math.floor((playerCount-1)/2)} FOR {playerCount} PLAYERS</div>
              </div>

              {/* Category picker */}
              <div style={{marginBottom:18}}>
                <SectionLabel>CATEGORY</SectionLabel>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {["ALL", ...Array.from(new Set(WORD_PACKS.map(p=>p.category)))].map(cat=>{
                    const active = selectedCategory===cat;
                    return (
                      <button key={cat} onClick={()=>setSelectedCategory(cat)} style={{
                        padding:"5px 10px",background:active?"#c8ff00":"#0d0d0d",
                        color:active?"#080808":"#555",
                        border:`1px solid ${active?"#c8ff00":"#222"}`,
                        cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:"0.06em",
                        transition:"all 0.15s",
                      }}>{cat}</button>
                    );
                  })}
                </div>
              </div>

              {/* Hints toggle */}
              <div style={{marginBottom:18}}>
                <SectionLabel>DUPE HINT</SectionLabel>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {[["ON","Dupe gets a related word"],["OFF","Dupe gets nothing"]].map(([val,desc])=>{
                    const active = (val==="ON")===hintsOn;
                    return (
                      <button key={val} onClick={()=>setHintsOn(val==="ON")} style={{
                        padding:"10px 0",background:active?"#c8ff00":"#0d0d0d",
                        color:active?"#080808":"#555",
                        border:`1px solid ${active?"#c8ff00":"#222"}`,
                        cursor:"pointer",transition:"all 0.15s",textAlign:"center",
                      }}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:"0.06em"}}>{val}</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:"0.08em",marginTop:2,opacity:0.7}}>{desc}</div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Hard words toggle */}
              <div>
                <SectionLabel>WORD DIFFICULTY</SectionLabel>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {[
                    [false,"EASY","Family friendly"],
                    [true, "ALL", "Harder words included"],
                  ].map(([val,label,desc])=>{
                    const active = hardWordsOn===val;
                    return (
                      <button key={label} onClick={()=>setHardWordsOn(val)} style={{
                        padding:"10px 0",background:active?"#c8ff00":"#0d0d0d",
                        color:active?"#080808":"#555",
                        border:`1px solid ${active?"#c8ff00":"#222"}`,
                        cursor:"pointer",transition:"all 0.15s",textAlign:"center",
                      }}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:"0.06em"}}>{label}</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:"0.08em",marginTop:2,opacity:0.7}}>{desc}</div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Game mode toggle */}
              <div>
                <SectionLabel>PLAY MODE</SectionLabel>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {[
                    ["PASS","PASS PHONE","One screen, take turns"],
                    ["QR",  "QR CODES",  "Everyone scans privately"],
                  ].map(([val,label,desc])=>{
                    const active = gameMode===val;
                    return (
                      <button key={val} onClick={()=>setGameMode(val)} style={{
                        padding:"10px 0",background:active?"#c8ff00":"#0d0d0d",
                        color:active?"#080808":"#555",
                        border:`1px solid ${active?"#c8ff00":"#222"}`,
                        cursor:"pointer",transition:"all 0.15s",textAlign:"center",
                      }}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:"0.06em"}}>{label}</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:"0.08em",marginTop:2,opacity:0.7}}>{desc}</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:10,marginBottom:28,alignItems:"flex-end"}}>
          {playerSetup.map((s,i)=>{
            const fp = { color:PLAYER_COLORS[s.colorIdx], animalId:s.animalId, accId:s.accId };
            return (
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <Token p={fp} size={36}/>
                <span className="mono" style={{fontSize:8,color:PLAYER_COLORS[s.colorIdx].accent,letterSpacing:"0.05em",lineHeight:1}}>
                  {s.name.slice(0,4).toUpperCase()}
                </span>
              </div>
            );
          })}
          <div style={{flex:1,height:1,background:"linear-gradient(90deg,#222,transparent)",marginLeft:4,marginBottom:8}} />
        </div>

        <button className="btn-p" onClick={()=>setScreen("CUSTOMIZE")} style={{padding:"18px 0",marginBottom:8}}>
          CUSTOMIZE PLAYERS →
        </button>
        <button onClick={startGame} className="btn-p" style={{
          background:"transparent",border:"1px solid #c8ff00",color:"#c8ff00",
          padding:"14px 0",letterSpacing:"0.1em",fontSize:16,
        }}
          onMouseEnter={e=>{e.currentTarget.style.background="#c8ff0011";}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";}}
        >START NOW</button>
      </div>
    </div>
  );

  // ── CUSTOMIZE ──────────────────────────────────────────
  if(screen==="CUSTOMIZE") {
    const usedColors = playerSetup.map(s=>s.colorIdx);
    return (
      <div className="dr noise-bg" style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
        <style>{css}</style>
        <div style={{background:"#0a0a0a",borderBottom:"1px solid #1a1a1a",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div className="display" style={{fontSize:32,color:"#e8e8e8"}}>CUSTOMIZE</div>
          <button onClick={()=>setScreen("LOBBY")} className="mono" style={{background:"transparent",border:"1px solid #2a2a2a",color:"#555",padding:"6px 14px",cursor:"pointer",fontSize:11,letterSpacing:"0.08em"}}>← BACK</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:16}}>
          <SectionLabel>TAP A PLAYER TO EDIT</SectionLabel>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {playerSetup.map((s,i)=>{
              const animal = ANIMALS.find(a=>a.id===s.animalId)||ANIMALS[0];
              const isOpen = editingPlayer===i;
              const fakeP = { color:PLAYER_COLORS[s.colorIdx], animalId:s.animalId, accId:s.accId };
              return (
                <div key={i}>
                  <button onClick={()=>{ setEditingPlayer(isOpen?null:i); setEditName(s.name); }}
                    style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"10px 14px",
                      background:isOpen?PLAYER_COLORS[s.colorIdx].bg:"#0d0d0d",
                      border:`1px solid ${isOpen?PLAYER_COLORS[s.colorIdx].accent:"#1e1e1e"}`,
                      cursor:"pointer",transition:"all 0.15s",textAlign:"left"}}>
                    <Token p={fakeP} size={44}/>
                    <div style={{flex:1}}>
                      <div className="display" style={{fontSize:20,color:isOpen?PLAYER_COLORS[s.colorIdx].accent:"#e8e8e8",lineHeight:1}}>{s.name.toUpperCase()}</div>
                      <div className="mono" style={{fontSize:10,color:"#555",marginTop:3,letterSpacing:"0.08em"}}>
                        {animal.label} · {ACCESSORIES.find(a=>a.id===s.accId)?.label}
                      </div>
                    </div>
                    <div className="mono" style={{fontSize:10,color:"#444"}}>{isOpen?"▲":"▼"}</div>
                  </button>

                  {isOpen&&(
                    <div className="card-in" style={{background:"#0a0a0a",border:"1px solid #1e1e1e",borderTop:"none",padding:16}}>

                      {/* Live preview */}
                      <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                          <Token p={{ color:PLAYER_COLORS[s.colorIdx], animalId:s.animalId, accId:s.accId }} size={80}/>
                          <div className="display" style={{fontSize:22,color:PLAYER_COLORS[s.colorIdx].accent}}>{s.name.toUpperCase()}</div>
                        </div>
                      </div>

                      {/* Name */}
                      <SectionLabel>NAME</SectionLabel>
                      <div style={{display:"flex",marginBottom:18,border:"1px solid #2a2a2a"}}>
                        <input value={editName} onChange={e=>setEditName(e.target.value.toUpperCase().slice(0,8))}
                          onKeyDown={e=>{ if(e.key==="Enter") setPlayerSetup(prev=>prev.map((p,pi)=>pi===i?{...p,name:editName||NAMES[i]}:p)); }}
                          maxLength={8} className="mono"
                          style={{flex:1,background:"#080808",border:"none",color:"#e8e8e8",padding:"10px 12px",fontSize:13,letterSpacing:"0.08em"}}/>
                        <button onClick={()=>setPlayerSetup(prev=>prev.map((p,pi)=>pi===i?{...p,name:editName||NAMES[i]}:p))}
                          className="btn-p" style={{width:"auto",padding:"10px 16px",fontSize:13}}>SAVE</button>
                      </div>

                      {/* Animal */}
                      <SectionLabel>ANIMAL</SectionLabel>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:18}}>
                        {ANIMALS.map(an=>{
                          const sel = s.animalId===an.id;
                          return (
                            <button key={an.id} onClick={()=>setPlayerSetup(prev=>prev.map((p,pi)=>pi===i?{...p,animalId:an.id}:p))}
                              className="mono"
                              style={{padding:"8px 4px",background:sel?PLAYER_COLORS[s.colorIdx].bg:"#080808",
                                border:`1px solid ${sel?PLAYER_COLORS[s.colorIdx].accent:"#1e1e1e"}`,
                                cursor:"pointer",transition:"all 0.15s",fontSize:10,letterSpacing:"0.06em",
                                color:sel?PLAYER_COLORS[s.colorIdx].accent:"#666"}}>
                              {an.label}
                            </button>
                          );
                        })}
                      </div>

                      {/* Accessory */}
                      <SectionLabel>ACCESSORY</SectionLabel>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:18}}>
                        {ACCESSORIES.map(ac=>{
                          const sel = s.accId===ac.id;
                          return (
                            <button key={ac.id} onClick={()=>setPlayerSetup(prev=>prev.map((p,pi)=>pi===i?{...p,accId:ac.id}:p))}
                              className="mono"
                              style={{padding:"8px 4px",background:sel?PLAYER_COLORS[s.colorIdx].bg:"#080808",
                                border:`1px solid ${sel?PLAYER_COLORS[s.colorIdx].accent:"#1e1e1e"}`,
                                cursor:"pointer",transition:"all 0.15s",fontSize:10,letterSpacing:"0.06em",
                                color:sel?PLAYER_COLORS[s.colorIdx].accent:"#666"}}>
                              {ac.label}
                            </button>
                          );
                        })}
                      </div>

                      {/* Color */}
                      <SectionLabel>COLOR</SectionLabel>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {PLAYER_COLORS.map((c,ci)=>{
                          const taken = usedColors.includes(ci)&&ci!==s.colorIdx;
                          const sel = ci===s.colorIdx;
                          return (
                            <button key={ci} onClick={()=>{ if(!taken) setPlayerSetup(prev=>prev.map((p,pi)=>pi===i?{...p,colorIdx:ci}:p)); }}
                              style={{width:32,height:32,background:sel?c.accent:`${c.accent}22`,
                                border:`2px solid ${sel?c.accent:taken?"#111":`${c.accent}44`}`,
                                cursor:taken?"not-allowed":"pointer",opacity:taken?0.2:1,
                                borderRadius:"50%",transition:"all 0.15s"}}/>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div style={{padding:16,borderTop:"1px solid #1a1a1a",flexShrink:0}}>
          <button className="btn-p" onClick={startGame} style={{padding:"18px 0"}}>START GAME →</button>
        </div>
      </div>
    );
  }


  // ── ROLE REVEAL ────────────────────────────────────────
  if(screen==="ROLE_REVEAL") {
    const cur = players[viewingPlayer];
    if(!cur) return null;

    // Build QR URL — all data in hash, never hits server
    const roleData = btoa(JSON.stringify({
      name: cur.name,
      isDupe: cur.isImposter,
      category: wordPack.category,
      word: cur.isImposter ? (hintsOn ? wordPack.decoy : null) : wordPack.word,
      hintsOn,
    }));
    const qrUrl = `${window.location.href.split('#')[0]}#r=${roleData}`;

    const allScanned = qrScanned >= players.length;

    // ── QR MODE ──
    if(gameMode === "QR") {
      return (
        <div className="dr noise-bg" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
          <style>{css}</style>
          <div style={{width:"100%",maxWidth:360}}>

            {/* Header */}
            <div style={{textAlign:"center",marginBottom:20}}>
              <div className="mono" style={{fontSize:10,color:"#444",letterSpacing:"0.15em",marginBottom:4}}>QR CODE MODE</div>
              <div className="display" style={{fontSize:34,color:"#e8e8e8",lineHeight:1}}>SCAN YOUR ROLE</div>
              <div className="mono" style={{fontSize:10,color:"#555",marginTop:6,letterSpacing:"0.08em"}}>
                Each player scans privately — host screen stays hidden
              </div>
            </div>

            {/* Scan counter */}
            <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:16}}>
              {players.map((_,i) => (
                <div key={i} style={{
                  width:10,height:10,borderRadius:"50%",
                  background: i < qrScanned ? "#c8ff00" : "#222",
                  border: `1px solid ${i < qrScanned ? "#c8ff00" : "#333"}`,
                  transition:"all 0.3s",
                }}/>
              ))}
            </div>
            <div className="mono" style={{textAlign:"center",fontSize:10,color:allScanned?"#c8ff00":"#555",letterSpacing:"0.12em",marginBottom:20}}>
              {allScanned ? "ALL PLAYERS CONFIRMED ✓" : `${qrScanned} / ${players.length} CONFIRMED`}
            </div>

            {/* Player QR cards */}
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {players.map((p, i) => {
                const pData = btoa(JSON.stringify({
                  name: p.name,
                  isDupe: p.isImposter,
                  category: wordPack.category,
                  word: p.isImposter ? (hintsOn ? wordPack.decoy : null) : wordPack.word,
                  hintsOn,
                }));
                const pUrl = `${window.location.href.split('#')[0]}#r=${pData}`;
                const confirmed = i < qrScanned;
                return (
                  <div key={p.id} style={{
                    background: confirmed ? "#0a0d0a" : "#0d0d0d",
                    border: `1px solid ${confirmed ? "#42D69355" : "#1e1e1e"}`,
                    padding:"14px 16px",
                    display:"flex", alignItems:"center", gap:14,
                    transition:"all 0.3s",
                  }}>
                    <Token p={p} size={40}/>
                    <div style={{flex:1}}>
                      <div className="display" style={{fontSize:20,color:p.color.accent,lineHeight:1}}>{p.name}</div>
                      <div className="mono" style={{fontSize:9,color:"#444",marginTop:2,letterSpacing:"0.08em"}}>
                        {confirmed ? "✓ CONFIRMED" : "scan QR below →"}
                      </div>
                    </div>
                    {!confirmed && (
                      <QRCanvas url={pUrl} size={60}/>
                    )}
                    {confirmed && (
                      <div style={{width:60,height:60,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <div style={{fontSize:28,color:"#42D693"}}>✓</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Confirm button — player taps this on host screen after scanning */}
            {!allScanned && (
              <button className="btn-p" onClick={()=>setQrScanned(n=>Math.min(n+1,players.length))} style={{padding:"16px 0",marginBottom:10}}>
                ✓ CONFIRM SCANNED ({qrScanned+1}/{players.length})
              </button>
            )}
            {allScanned && (
              <button className="btn-p" onClick={()=>setScreen("DISCUSSION")} style={{padding:"16px 0",background:"#42D693",color:"#080808"}}>
                ALL CONFIRMED — BEGIN DISCUSSION →
              </button>
            )}

            <button onClick={()=>setQrScanned(n=>Math.max(0,n-1))} style={{
              width:"100%",background:"transparent",border:"none",
              color:"#333",fontFamily:"'DM Mono',monospace",fontSize:10,
              cursor:"pointer",padding:"8px 0",letterSpacing:"0.08em",
            }}>undo last confirm</button>

          </div>
        </div>
      );
    }

    // ── PASS THE PHONE MODE (original) ──
    return (
      <div className="dr noise-bg" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        <div style={{width:"100%",maxWidth:360}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div className="mono" style={{fontSize:11,color:"#444",letterSpacing:"0.15em",marginBottom:6}}>
              PLAYER {viewingPlayer+1} OF {players.length}
            </div>
            <div className="display" style={{fontSize:38,color:"#e8e8e8"}}>CHECK YOUR ROLE</div>
          </div>

          {!roleRevealed ? (
            <div className="card-in">
              <button onClick={()=>setRoleRevealed(true)} style={{
                width:"100%",background:"#0d0d0d",border:`2px solid ${cur.color.accent}33`,
                padding:"32px 40px",cursor:"pointer",transition:"all 0.2s",
                display:"flex",flexDirection:"column",alignItems:"center",
              }}
                onMouseEnter={e=>e.currentTarget.style.borderColor=cur.color.accent}
                onMouseLeave={e=>e.currentTarget.style.borderColor=`${cur.color.accent}33`}
              >
                <Token p={cur} size={80} />
                <div className="display" style={{fontSize:36,color:cur.color.accent,marginTop:12}}>{cur.name}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:16,width:"100%"}}>
                  <div style={{flex:1,height:1,background:"#1e1e1e"}} />
                  <span className="mono" style={{fontSize:11,color:"#444",letterSpacing:"0.12em"}}>TAP TO REVEAL</span>
                  <div style={{flex:1,height:1,background:"#1e1e1e"}} />
                </div>
              </button>
            </div>
          ) : (
            <div className="card-in">
              <div style={{
                background:cur.isImposter?"#0d0808":"#080f0a",
                border:`1px solid ${cur.isImposter?"#FF4545":"#42D693"}`,
                padding:28,
              }}>
                <div style={{textAlign:"center",marginBottom:22}}>
                  <div className="display" style={{fontSize:46,color:cur.isImposter?"#FF4545":"#42D693",lineHeight:1}}>
                    {cur.isImposter?"YOU'RE THE DUPE":"BRIEFED"}
                  </div>
                </div>
                <div style={{height:1,background:"#1e1e1e",marginBottom:20}} />
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:cur.isImposter?14:0}}>
                  <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:"14px 16px"}}>
                    <SectionLabel>CATEGORY</SectionLabel>
                    <div className="display" style={{fontSize:22,color:"#e8e8e8"}}>{wordPack.category}</div>
                  </div>
                  <div style={{background:cur.isImposter?"#150808":"#080808",border:`1px solid ${cur.isImposter?"#3a1515":"#1a1a1a"}`,padding:"14px 16px"}}>
                    <SectionLabel>{cur.isImposter?"YOUR WORD":"THE WORD"}</SectionLabel>
                    <div className="display" style={{fontSize:22,color:cur.isImposter?"#FF4545":"#c8ff00"}}>
                      {cur.isImposter?(hintsOn?wordPack.decoy:"???"):wordPack.word}
                    </div>
                  </div>
                </div>
                {cur.isImposter&&(
                  <div style={{background:"#100808",border:"1px dashed #2a1515",padding:"10px 14px",marginBottom:16}}>
                    <div className="mono" style={{fontSize:11,color:"#FF454599",lineHeight:1.6}}>
                      This is NOT their word. Blend in. Listen for clues. Guess the real word to win.
                    </div>
                  </div>
                )}
                <button className="btn-p" onClick={()=>{
                  setRoleRevealed(false);
                  if(viewingPlayer<players.length-1) setViewingPlayer(v=>v+1);
                  else setScreen("DISCUSSION");
                }} style={{padding:"16px 0"}}>
                  {viewingPlayer<players.length-1?`PASS TO ${players[viewingPlayer+1]?.name}`:"BEGIN DISCUSSION"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── DISCUSSION ─────────────────────────────────────────
  if(screen==="DISCUSSION") {
    const curPlayer = active[cluePlayer % active.length];
    const allHadTurn = cluePlayer >= active.length;
    return (
    <div className="dr" style={{display:"flex",flexDirection:"column",height:"100dvh",overflow:"hidden"}}>
      <style>{css}</style>

      {/* Compact header */}
      <div style={{background:"#0a0a0a",borderBottom:"1px solid #1a1a1a",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",gap:4}}>
            {Array.from({length:maxRounds},(_,i)=><Pip key={i} active={i<round}/>)}
          </div>
          <div className="display" style={{fontSize:22,lineHeight:1,color:"#e8e8e8"}}>ROUND {round}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div className="mono" style={{fontSize:9,color:"#555",letterSpacing:"0.1em"}}>WRONG</div>
          <div className="display" style={{fontSize:22,color:wrongVotes>0?"#FF4545":"#e8e8e8"}}>{wrongVotes}/{maxWrong}</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>

        {/* Current turn card — compact horizontal */}
        <div className="card-in" style={{
          background:curPlayer?.color.bg || "#0d0d0d",
          border:`1px solid ${curPlayer?.color.accent || "#2a2a2a"}`,
          padding:"12px 16px", marginBottom:10,
          display:"flex", alignItems:"center", gap:14,
        }}>
          <Token p={curPlayer} size={52}/>
          {(() => {
            const cp = active.find(p=>p.id===curPlayer?.id);
            const peekWord = cp?.isImposter ? (hintsOn ? wordPack?.decoy : "???") : wordPack?.word;
            return (
              <div style={{flex:1}}>
                <div className="mono" style={{fontSize:9,color:"#555",letterSpacing:"0.15em",marginBottom:2}}>SAY YOUR CLUE OUT LOUD</div>
                <div className="display" style={{fontSize:32,color:curPlayer?.color.accent,lineHeight:1}}>{curPlayer?.name}</div>
                <button onClick={peek} style={{
                  marginTop:6,padding:"3px 10px",background:"transparent",
                  border:`1px solid ${curPlayer?.color.accent}44`,
                  color:curPlayer?.color.accent,cursor:"pointer",
                  fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:"0.08em",
                  WebkitTapHighlightColor:"transparent",touchAction:"manipulation",
                }}>
                  {peeking ? (
                    <span style={{display:"flex",flexDirection:"column",gap:2}}>
                      <span style={{color:"#e8e8e8",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:"0.06em"}}>{peekWord}</span>
                      {cp?.isImposter && <span style={{color:"#FF4545",fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:"0.1em"}}>YOU ARE THE DUPE</span>}
                    </span>
                  ) : "PEEK WORD 👁"}
                </button>
              </div>
            );
          })()}
          {/* Turn progress dots */}
          <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
            {active.map((p,i) => {
              const done = i < (cluePlayer % active.length);
              const cur2 = i === (cluePlayer % active.length);
              return <div key={p.id} style={{width:6,height:6,borderRadius:"50%",background:cur2?p.color.accent:done?`${p.color.accent}55`:"#222",transition:"all 0.2s"}}/>;
            })}
          </div>
        </div>

        {/* Sus pick */}
        {(() => {
          const mySusTarget = curPlayer ? susMap[curPlayer.id] : null;
          const mySusName = mySusTarget !== undefined ? active.find(t=>t.id===mySusTarget)?.name : null;
          return (
            <div style={{background:"#0a0a0a",border:"1px solid #1e1e1e",padding:"8px 12px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div className="mono" style={{fontSize:9,color:"#444",letterSpacing:"0.1em",marginBottom:1}}>{curPlayer?.name}'S SUS</div>
                <div className="display" style={{fontSize:15,color:mySusName?curPlayer?.color.accent:"#333",lineHeight:1}}>{mySusName||"NONE"}</div>
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:"60%"}}>
                {active.filter(p=>p.id!==curPlayer?.id).map(p=>{
                  const sel = susMap[curPlayer?.id]===p.id;
                  return (
                    <button key={p.id} onClick={()=>{
                      setSusMap(prev=>({...prev,[curPlayer.id]:sel?undefined:p.id}));
                      if(!sel){setAnimateSus(p.id);setTimeout(()=>setAnimateSus(null),600);}
                    }} style={{padding:"3px 7px",background:sel?curPlayer?.color.bg:"#080808",border:`1px solid ${sel?curPlayer?.color.accent:"#2a2a2a"}`,cursor:"pointer",transition:"all 0.12s"}}>
                      <span className="mono" style={{fontSize:9,color:sel?curPlayer?.color.accent:"#555",letterSpacing:"0.05em"}}>{p.name}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* Sus board — mugshot polaroid cards */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10,justifyContent:"center"}}>
          {active.map(p=>{
            const count = susCount(p.id);
            const maxCount = active.length-1;
            const pct = maxCount>0?count/maxCount:0;
            const isSuspect = pct >= 0.5;
            const isHot = pct >= 0.65;
            const susVoters = active.filter(src=>susMap[src.id]===p.id);
            const borderCol = isHot?"#FF4545":isSuspect?"#FFB830":animateSus===p.id?p.color.accent:"#2a2a2a";
            return (
              <div key={p.id} className={animateSus===p.id?"shake":""} style={{
                background:"#111",
                border:`1.5px solid ${borderCol}`,
                padding:"6px 6px 4px",
                display:"flex",flexDirection:"column",alignItems:"center",gap:0,
                position:"relative",
                minWidth:58,
                transition:"border-color 0.3s",
                boxShadow: isHot?"0 0 10px #FF454533":isSuspect?"0 0 8px #FFB83033":"none",
              }}>
                {/* SUSPECT stamp — fades in */}
                {isSuspect && (
                  <div style={{
                    position:"absolute",top:4,left:0,right:0,
                    display:"flex",justifyContent:"center",zIndex:2,pointerEvents:"none",
                  }}>
                    <div style={{
                      fontFamily:"'Bebas Neue',sans-serif",
                      fontSize:10,letterSpacing:"0.15em",
                      color:isHot?"#FF4545":"#FFB830",
                      border:`1.5px solid ${isHot?"#FF4545":"#FFB830"}`,
                      padding:"0px 4px",lineHeight:1.4,
                      opacity:0.9,transform:"rotate(-8deg)",
                      background:"#111",
                    }}>SUSPECT</div>
                  </div>
                )}
                {/* Avatar */}
                <div style={{marginTop: isSuspect?12:4, marginBottom:4}}>
                  <Token p={p} size={44}/>
                </div>
                {/* Name strip */}
                <div style={{
                  background:"#0a0a0a",width:"100%",textAlign:"center",
                  padding:"2px 4px",marginBottom:3,
                }}>
                  <div className="mono" style={{fontSize:8,color:isHot?"#FF4545":isSuspect?"#FFB830":p.color.accent,letterSpacing:"0.08em",lineHeight:1.3}}>
                    {p.name.slice(0,6)}
                  </div>
                </div>
                {/* Voter dots */}
                <div style={{display:"flex",gap:2,minHeight:6,justifyContent:"center"}}>
                  {susVoters.map(src=>(
                    <div key={src.id} title={src.name} style={{width:5,height:5,borderRadius:"50%",background:src.color.accent}}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {round>=3&&!showGuess&&(
          <button onClick={()=>setShowGuess(true)} className="mono" style={{
            width:"100%",background:"transparent",border:"1px dashed #3a1515",
            color:"#FF454566",padding:"9px 0",cursor:"pointer",fontSize:11,
            letterSpacing:"0.08em",marginBottom:10,transition:"all 0.15s",
          }}
            onMouseEnter={e=>e.target.style.color="#FF4545"}
            onMouseLeave={e=>e.target.style.color="#FF454566"}
          >▸ DUPE ONLY: GUESS THE REAL WORD TO WIN INSTANTLY</button>
        )}

        {showGuess&&(
          <div className="card-in" style={{background:"#0d0808",border:"1px solid #3a1515",padding:16,marginBottom:10}}>
            <div className="mono" style={{fontSize:10,color:"#FF4545",marginBottom:10,letterSpacing:"0.12em"}}>DUPE — WHAT IS THE REAL WORD?</div>
            <div style={{display:"flex"}}>
              <input value={imposterGuess} onChange={e=>setImposterGuess(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&tryGuess()}
                placeholder="TYPE WORD..."
                className="mono"
                style={{flex:1,background:"#080808",border:"1px solid #2a1515",borderRight:"none",color:"#e8e8e8",padding:"10px 12px",fontSize:13,letterSpacing:"0.06em"}}
              />
              <button onClick={tryGuess} className="btn-p" style={{width:"auto",padding:"10px 20px",fontSize:16}}>GO</button>
            </div>
            {guessResult&&(
              <div className="mono" style={{marginTop:10,fontSize:11,letterSpacing:"0.1em",color:guessResult==="correct"?"#42D693":"#FF4545"}}>
                {guessResult==="correct"?"✓ CORRECT — DUPE WINS":"✗ WRONG — STAY HIDDEN"}
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{padding:16,borderTop:"1px solid #1a1a1a",flexShrink:0,display:"flex",flexDirection:"column",gap:8}}>
        <button className="btn-p" onClick={()=>{
          const next = cluePlayer + 1;
          setCluePlayer(next);
          setPeeking(false);
          // end of a full cycle — increment round
          if(next % active.length === 0) setRound(r => r + 1);
        }} style={{padding:"18px 0",fontSize:20}}>
          DONE →
        </button>
        <button
          className="btn-p"
          onClick={()=>{if(allHadTurn){setVotes({});setVotingPlayer(0);setVoteResult(null);setScreen("VOTE");}}}
          style={{
            padding:"14px 0",background:"transparent",fontSize:16,
            border:`1px solid ${allHadTurn?"#c8ff00":"#2a2a2a"}`,
            color:allHadTurn?"#c8ff00":"#333",
            cursor:allHadTurn?"pointer":"default",
            transition:"all 0.3s",
          }}
        >
          {allHadTurn ? "CALL A VOTE →" : `CALL A VOTE — ${active.length - (cluePlayer % active.length)} LEFT`}
        </button>
      </div>
    </div>
    );
  }

  // ── VOTE ──────────────────────────────────────────────
  if(screen==="VOTE") {
    const voter = active[votingPlayer];
    if(!voter) return null;
    return (
      <div className="dr noise-bg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        {revealing ? (
          <div className="fade-in" style={{textAlign:"center"}}>
            <div className="display pulse" style={{fontSize:72,color:"#c8ff00",lineHeight:1}}>COUNTING</div>
            <div className="mono" style={{fontSize:11,color:"#555",letterSpacing:"0.15em",marginTop:10}}>PROCESSING VOTES</div>
            <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:24}}>
              {[0,1,2].map(i=><div key={i} style={{width:10,height:10,background:"#c8ff00",clipPath:"polygon(50% 0%,100% 50%,50% 100%,0% 50%)",animation:`pulseAnim 0.7s ${i*0.2}s ease infinite`}}/>)}
            </div>
          </div>
        ) : (
          <div className="card-in" style={{width:"100%",maxWidth:360}}>
            <div style={{background:"#0d0d0d",border:`1px solid ${voter.color.accent}`,padding:24}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,paddingBottom:16,borderBottom:"1px solid #1a1a1a"}}>
                <Token p={voter} size={44}/>
                <div>
                  <div className="display" style={{fontSize:30,color:"#e8e8e8",lineHeight:1}}>{voter.name}</div>
                  <div className="mono" style={{fontSize:10,color:"#555",letterSpacing:"0.1em",marginTop:3}}>
                    VOTE {votingPlayer+1} / {active.length}
                  </div>
                </div>
              </div>
              <SectionLabel>WHO IS THE DUPE?</SectionLabel>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {active.filter(p=>p.id!==voter.id).map(p=>{
                  const voted = votes[votingPlayer]===p.id;
                  return (
                    <button key={p.id} onClick={()=>castVote(p.id)} disabled={votes[votingPlayer]!==undefined} style={{
                      display:"flex",alignItems:"center",gap:12,padding:"11px 14px",
                      background:voted?p.color.bg:"#080808",
                      border:`1px solid ${voted?p.color.accent:"#1e1e1e"}`,
                      cursor:votes[votingPlayer]!==undefined?"default":"pointer",
                      transition:"all 0.15s",
                    }}
                      onMouseEnter={e=>{if(!votes[votingPlayer])e.currentTarget.style.borderColor="#333";}}
                      onMouseLeave={e=>{if(!voted)e.currentTarget.style.borderColor="#1e1e1e";}}
                    >
                      <Token p={p} size={36}/>
                      <div style={{flex:1}}>
                        <div className="display" style={{fontSize:20,color:voted?p.color.accent:"#e8e8e8",marginBottom:5}}>{p.name}</div>
                        <div style={{height:2,background:"#1a1a1a"}}>
                          {(() => { const cnt=susCount(p.id); const mx=active.length-1; const pct=mx>0?cnt/mx:0; return <div style={{height:"100%",width:`${pct*100}%`,background:pct>0.65?"#FF4545":pct>0.35?"#FFB830":"#42D693",transition:"width 0.4s"}}/>; })()}
                        </div>
                      </div>
                      <span className="mono" style={{fontSize:11,color:voted?p.color.accent:"#555"}}>{susCount(p.id)}/{active.length-1}</span>
                    </button>
                  );
                })}
              </div>
              {votes[votingPlayer]!==undefined&&(
                <div className="mono pulse" style={{fontSize:11,color:"#444",textAlign:"center",marginTop:16,letterSpacing:"0.1em"}}>
                  PASSING DEVICE TO NEXT PLAYER
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── VOTE RESULT ────────────────────────────────────────
  if(screen==="VOTE_RESULT") {
    const elim = players.find(p=>p.id===voteResult?.eliminatedId);
    return (
      <div className="dr noise-bg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        <div className="card-in" style={{width:"100%",maxWidth:360,textAlign:"center"}}>
          <div style={{background:"#0d0808",border:"1px solid #FF4545",padding:32}}>
            <div className="display" style={{fontSize:68,color:"#FF4545",lineHeight:1}}>WRONG</div>
            <div className="display" style={{fontSize:22,color:"#555",marginTop:2}}>DUPE STILL AT LARGE</div>
            <div style={{height:1,background:"#2a1515",margin:"24px 0"}}/>
            {elim&&<>
              <Token p={elim} size={64} />
              <div className="display" style={{fontSize:30,color:elim.color.accent,marginTop:12}}>{elim.name}</div>
              <div className="mono" style={{fontSize:11,color:"#555",marginTop:4,letterSpacing:"0.12em"}}>WAS INNOCENT</div>
            </>}
            <div style={{display:"flex",justifyContent:"space-between",background:"#080808",border:"1px solid #2a1515",padding:"12px 16px",margin:"20px 0"}}>
              <span className="mono" style={{fontSize:11,color:"#555",letterSpacing:"0.1em"}}>WRONG VOTES USED</span>
              <span className="mono" style={{fontSize:11,color:"#FF4545"}}>{wrongVotes} / {maxWrong}</span>
            </div>
            <button className="btn-p" onClick={()=>{setScreen("DISCUSSION");}} style={{padding:"16px 0"}}>
              CONTINUE →
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── GAME END ───────────────────────────────────────────
  if(screen==="GAME_END") {
    const win = gameResult!=="BRIEFED_WIN";
    return (
      <div className="dr noise-bg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        <div className="card-in" style={{width:"100%",maxWidth:390}}>
          <div style={{background:win?"#0d0808":"#080f0a",border:`2px solid ${win?"#FF4545":"#42D693"}`,padding:32}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div className="display" style={{fontSize:80,lineHeight:0.9,color:win?"#FF4545":"#42D693"}}>
                {win?"DUPE":"CAUGHT"}
              </div>
              <div className="display" style={{fontSize:28,color:"#444",marginTop:6}}>
                {win?"WINS":"BRIEFED WIN"}
              </div>
              <div className="mono" style={{fontSize:11,color:"#555",marginTop:8,letterSpacing:"0.12em"}}>
                {gameResult==="IMPOSTER_WINS_GUESS"&&"DUPE GUESSED THE WORD CORRECTLY"}
                {gameResult==="IMPOSTER_WINS_SURVIVAL"&&"DUPE SURVIVED ALL VOTES"}
                {gameResult==="BRIEFED_WIN"&&"THE CREW WAS BRIEFED — DUPE EXPOSED"}
              </div>
            </div>
            <div style={{height:1,background:"#2a2a2a",marginBottom:24}}/>
            {imposter&&(
              <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:20,marginBottom:16}}>
                <SectionLabel>THE DUPE WAS</SectionLabel>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <Token p={imposter} size={60}/>
                  <div>
                    <div className="display" style={{fontSize:34,color:imposter.color.accent,lineHeight:1}}>{imposter.name}</div>
                    <div className="mono" style={{fontSize:11,color:"#555",marginTop:4}}>IMPOSTER</div>
                  </div>
                </div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:24}}>
              <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:"14px 16px"}}>
                <SectionLabel>REAL WORD</SectionLabel>
                <div className="display" style={{fontSize:26,color:"#c8ff00"}}>{wordPack?.word}</div>
                <div className="mono" style={{fontSize:10,color:"#555",marginTop:2}}>{wordPack?.category}</div>
              </div>
              <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:"14px 16px"}}>
                <SectionLabel>DUPE HAD</SectionLabel>
                <div className="display" style={{fontSize:26,color:"#FF4545"}}>{wordPack?.decoy}</div>
                <div className="mono" style={{fontSize:10,color:"#555",marginTop:2}}>CLOSE BUT NOT IT</div>
              </div>
            </div>
            <button className="btn-p" onClick={()=>setScreen("LOBBY")} style={{padding:"18px 0"}}>
              PLAY AGAIN
            </button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

    ReactDOM.createRoot(document.getElementById('game-root')).render(<DupeGame />);
  </script>
