function pickWordPack(category = "ALL", hardWordsOn = false) {
  let pool = hardWordsOn ? WORD_PACKS : WORD_PACKS.filter(p => p.easy);
  if (category !== "ALL") pool = pool.filter(p => p.category === category);
  if (pool.length === 0) pool = WORD_PACKS.filter(p => p.easy); // fallback
  const pack = pool[Math.floor(Math.random() * pool.length)];
  return {
    category: pack.category,
    word: pack.word,
    decoy: pack.decoys[Math.floor(Math.random() * pack.decoys.length)],
  };
}

function generatePlayers(setup, dupeCount = 1) {
  const indices = [];
  while (indices.length < Math.min(dupeCount, setup.length - 1)) {
    const idx = Math.floor(Math.random() * setup.length);
    if (!indices.includes(idx)) indices.push(idx);
  }
  return setup.map((s, i) => ({
    id: i,
    name: s.name.toUpperCase().slice(0, 8),
    color: PLAYER_COLORS[s.colorIdx],
    animalId: s.animalId,
    accId: s.accId,
    isImposter: indices.includes(i),
    sus: 0,
    eliminated: false,
  }));
}

function DupeGame() {
  // ── Connection state ──
  const [screen, setScreen] = useState("HOME");
  const [roomCode, setRoomCode] = useState("");
  const [playerId] = useState(() => {
    try {
      const stored = sessionStorage.getItem("dupe_player_id");
      if (stored) return stored;
      const id = generatePlayerId();
      sessionStorage.setItem("dupe_player_id", id);
      return id;
    } catch {
      return generatePlayerId();
    }
  });
  const [isHost, setIsHost] = useState(false);
  const [error, setError] = useState("");
  const [joinCode, setJoinCode] = useState("");

  // ── Player setup ──
  const [myName, setMyName] = useState("");
  const [myColorIdx, setMyColorIdx] = useState(0);
  const [myAnimalId, setMyAnimalId] = useState("fox");
  const [myAccId, setMyAccId] = useState("none");

  // ── Live game state (synced from Firebase) ──
  const [roomData, setRoomData] = useState(null);
  const [players, setPlayers] = useState({});
  const [votes, setVotes] = useState({});
  const [susMap, setSusMap] = useState({});
  const [myVote, setMyVote] = useState(null);
  const [hasVoted, setHasVoted] = useState(false);

  // ── Local UI state ──
  const [peeking, setPeeking] = useState(false);
  const [showGuess, setShowGuess] = useState(false);
  const [imposterGuess, setImposterGuess] = useState("");
  const [guessResult, setGuessResult] = useState(null);
  const [animateSus, setAnimateSus] = useState(null);
  const [roleReady, setRoleReady] = useState(false);

  // ── Settings (host only) ──
  const [selectedCategory, setSelectedCategory] = useState("ALL");
  const [hintsOn, setHintsOn] = useState(true);
  const [hardWordsOn, setHardWordsOn] = useState(false);
  const [maxWrongSetting, setMaxWrongSetting] = useState(2);
  const [dupeCount, setDupeCount] = useState(1);

  // ── Derived state ──
  const playerList = Object.entries(players).map(([id, p]) => ({ ...p, id })).sort((a, b) => a.order - b.order);
  const activePlayers = playerList.filter(p => !p.eliminated);
  const me = players[playerId];
  const maxRounds = 4;
  const room = roomData || {};
  const game = room.game || {};
  const gameStatus = room.status || "lobby";
  const imposterIds = game.imposterIds || {};
  const amImposter = !!imposterIds[playerId];

  // ── Firebase listeners ──
  useEffect(() => {
    if (!roomCode || !db) return;
    const ref = roomRef(roomCode);
    if (!ref) return;

    const unsubs = [];

    // Listen to room root (status, settings, game state)
    const roomListener = ref.on("value", snap => {
      const data = snap.val();
      if (data) {
        setRoomData(data);
        // Sync local screen to room status
        if (data.status) {
          setScreen(data.status.toUpperCase());
        }
      }
    });
    unsubs.push(() => ref.off("value", roomListener));

    // Listen to players
    const playersListener = ref.child("players").on("value", snap => {
      setPlayers(snap.val() || {});
    });
    unsubs.push(() => ref.child("players").off("value", playersListener));

    // Listen to votes
    const votesListener = ref.child("votes").on("value", snap => {
      setVotes(snap.val() || {});
    });
    unsubs.push(() => ref.child("votes").off("value", votesListener));

    // Listen to susMap
    const susListener = ref.child("susMap").on("value", snap => {
      setSusMap(snap.val() || {});
    });
    unsubs.push(() => ref.child("susMap").off("value", susListener));

    return () => unsubs.forEach(fn => fn());
  }, [roomCode]);

  // Reset vote state when entering vote screen
  useEffect(() => {
    if (gameStatus === "vote") {
      setHasVoted(false);
      setMyVote(null);
    }
  }, [gameStatus]);

  // ── Room creation ──
  async function createRoom() {
    const code = generateRoomCode();
    const name = myName.trim().toUpperCase().slice(0, 8) || "HOST";
    await roomRef(code).set({
      host: playerId,
      status: "lobby",
      settings: { category: "ALL", hintsOn: true, hardWordsOn: false, maxWrong: 2, dupeCount: 1 },
      createdAt: firebase.database.ServerValue.TIMESTAMP,
    });
    await roomRef(code).child(`players/${playerId}`).set({
      name, colorIdx: myColorIdx, animalId: myAnimalId, accId: myAccId,
      order: 0, eliminated: false, ready: false,
    });
    setRoomCode(code);
    setIsHost(true);
    setScreen("LOBBY");
  }

  // ── Join room ──
  async function joinRoom() {
    const code = joinCode.trim().toUpperCase();
    if (code.length !== 4) { setError("Enter a 4-letter code"); return; }
    const snap = await roomRef(code).once("value");
    if (!snap.exists()) { setError("Room not found"); return; }
    const data = snap.val();
    if (data.status !== "lobby") { setError("Game already in progress"); return; }
    const existingPlayers = data.players || {};
    const count = Object.keys(existingPlayers).length;
    if (count >= 8) { setError("Room is full"); return; }

    const name = myName.trim().toUpperCase().slice(0, 8) || NAMES[count % NAMES.length];
    // Pick color/animal not taken
    const usedColors = Object.values(existingPlayers).map(p => p.colorIdx);
    const usedAnimals = Object.values(existingPlayers).map(p => p.animalId);
    let colorIdx = myColorIdx;
    if (usedColors.includes(colorIdx)) colorIdx = [0,1,2,3,4,5,6,7].find(c => !usedColors.includes(c)) || 0;
    const animalIds = ["fox","bear","rabbit","cat","wolf","panda","raccoon","owl"];
    let animalId = myAnimalId;
    if (usedAnimals.includes(animalId)) animalId = animalIds.find(a => !usedAnimals.includes(a)) || "fox";

    await roomRef(code).child(`players/${playerId}`).set({
      name, colorIdx, animalId, accId: myAccId,
      order: count, eliminated: false, ready: false,
    });
    setRoomCode(code);
    setMyColorIdx(colorIdx);
    setMyAnimalId(animalId);
    setIsHost(data.host === playerId);
    setScreen("LOBBY");
  }

  // ── Start game (host only) ──
  async function startGame() {
    if (!isHost || playerList.length < 3) return;
    const pack = pickWordPack(selectedCategory, hardWordsOn);
    // Assign imposters randomly
    const ids = playerList.map(p => p.id);
    const shuffled = [...ids].sort(() => Math.random() - 0.5);
    const impCount = Math.min(dupeCount, Math.floor((ids.length - 1) / 2));
    const impIds = {};
    shuffled.slice(0, impCount).forEach(id => { impIds[id] = true; });

    await roomRef(roomCode).update({
      status: "role_reveal",
      "settings/category": selectedCategory,
      "settings/hintsOn": hintsOn,
      "settings/hardWordsOn": hardWordsOn,
      "settings/maxWrong": maxWrongSetting,
      "settings/dupeCount": dupeCount,
      game: {
        word: pack.word,
        decoy: pack.decoy,
        category: pack.category,
        round: 1,
        cluePlayer: 0,
        wrongVotes: 0,
        gameResult: null,
        imposterIds: impIds,
        voteResult: null,
      },
      votes: null,
      susMap: null,
    });
    // Reset all players' eliminated/ready state
    const updates = {};
    playerList.forEach(p => {
      updates[`players/${p.id}/eliminated`] = false;
      updates[`players/${p.id}/ready`] = false;
    });
    await roomRef(roomCode).update(updates);
    setRoleReady(false);
  }

  // ── Player marks ready after seeing role ──
  async function markReady() {
    setRoleReady(true);
    await roomRef(roomCode).child(`players/${playerId}/ready`).set(true);
    // If host, check if all ready
    if (isHost) checkAllReady();
  }

  async function checkAllReady() {
    const snap = await roomRef(roomCode).child("players").once("value");
    const pl = snap.val() || {};
    const allReady = Object.values(pl).every(p => p.ready);
    if (allReady) {
      await roomRef(roomCode).update({ status: "discussion" });
    }
  }

  // Host polls for all-ready when players update
  useEffect(() => {
    if (isHost && gameStatus === "role_reveal") {
      const allReady = playerList.length >= 3 && playerList.every(p => p.ready);
      if (allReady) {
        roomRef(roomCode).update({ status: "discussion" });
      }
    }
  }, [players, gameStatus]);

  // ── Advance clue turn (current player clicks DONE) ──
  async function advanceClue() {
    const next = game.cluePlayer + 1;
    const updates = { "game/cluePlayer": next };
    if (next % activePlayers.length === 0) {
      updates["game/round"] = game.round + 1;
    }
    await roomRef(roomCode).update(updates);
    setPeeking(false);
  }

  // ── Call a vote (host or current player) ──
  async function callVote() {
    if (game.cluePlayer < activePlayers.length) return; // need at least one full cycle
    await roomRef(roomCode).update({
      status: "vote",
      votes: null,
    });
  }

  // ── Cast vote ──
  async function castVote(targetId) {
    if (hasVoted) return;
    setMyVote(targetId);
    setHasVoted(true);
    await roomRef(roomCode).child(`votes/${playerId}`).set(targetId);
    // If host, check if all active players voted
    if (isHost) setTimeout(() => checkAllVoted(), 500);
  }

  // ── Check all voted (host) ──
  useEffect(() => {
    if (!isHost || gameStatus !== "vote") return;
    const activeIds = activePlayers.map(p => p.id);
    const allVoted = activeIds.every(id => votes[id] !== undefined);
    if (allVoted && activeIds.length > 0) {
      resolveVote();
    }
  }, [votes, gameStatus]);

  async function resolveVote() {
    const tally = {};
    Object.values(votes).forEach(v => { tally[v] = (tally[v] || 0) + 1; });
    const maxV = Math.max(...Object.values(tally));
    const elimId = Object.keys(tally).find(k => tally[k] === maxV);
    const wasImposter = !!imposterIds[elimId];

    // Eliminate player
    await roomRef(roomCode).child(`players/${elimId}/eliminated`).set(true);

    if (wasImposter) {
      // Check if all imposters eliminated
      const remainingImposters = Object.keys(imposterIds).filter(id => id !== elimId && !players[id]?.eliminated);
      if (remainingImposters.length === 0) {
        await roomRef(roomCode).update({
          status: "game_end",
          "game/gameResult": "BRIEFED_WIN",
          "game/voteResult": { eliminatedId: elimId, wasImposter: true },
        });
        return;
      }
    }

    const nw = (game.wrongVotes || 0) + (wasImposter ? 0 : 1);
    const maxWrong = room.settings?.maxWrong || 2;

    if (!wasImposter && (nw >= maxWrong || game.round >= maxRounds)) {
      await roomRef(roomCode).update({
        status: "game_end",
        "game/gameResult": "IMPOSTER_WINS_SURVIVAL",
        "game/wrongVotes": nw,
        "game/voteResult": { eliminatedId: elimId, wasImposter: false },
      });
    } else {
      await roomRef(roomCode).update({
        status: "vote_result",
        "game/wrongVotes": nw,
        "game/voteResult": { eliminatedId: elimId, wasImposter },
      });
    }
  }

  // ── Continue from vote result ──
  async function continueFromVote() {
    if (!isHost) return;
    // Reset votes and back to discussion
    await roomRef(roomCode).update({
      status: "discussion",
      votes: null,
    });
    // Reset ready states
    const updates = {};
    playerList.forEach(p => { updates[`players/${p.id}/ready`] = false; });
    await roomRef(roomCode).update(updates);
  }

  // ── Dupe guess ──
  async function tryGuess() {
    const ok = imposterGuess.trim().toUpperCase() === game.word.toUpperCase();
    setGuessResult(ok ? "correct" : "wrong");
    if (ok) {
      setTimeout(async () => {
        await roomRef(roomCode).update({
          status: "game_end",
          "game/gameResult": "IMPOSTER_WINS_GUESS",
        });
      }, 1200);
    } else {
      setTimeout(() => { setGuessResult(null); setShowGuess(false); setImposterGuess(""); }, 1500);
    }
  }

  // ── Play again ──
  async function playAgain() {
    if (!isHost) return;
    const updates = { status: "lobby", game: null, votes: null, susMap: null };
    playerList.forEach(p => {
      updates[`players/${p.id}/eliminated`] = false;
      updates[`players/${p.id}/ready`] = false;
    });
    await roomRef(roomCode).update(updates);
  }

  // ── Sus management ──
  async function toggleSus(targetId) {
    const current = susMap[playerId];
    const newVal = current === targetId ? null : targetId;
    if (newVal) {
      await roomRef(roomCode).child(`susMap/${playerId}`).set(newVal);
      setAnimateSus(targetId);
      setTimeout(() => setAnimateSus(null), 600);
    } else {
      await roomRef(roomCode).child(`susMap/${playerId}`).remove();
    }
  }

  function susCount(targetId) {
    return Object.values(susMap).filter(t => t === targetId).length;
  }

  function peek() {
    setPeeking(true);
    setTimeout(() => setPeeking(false), 2000);
  }

  // ── Helper to get player display object ──
  function getPlayerDisplay(p) {
    return { ...p, color: PLAYER_COLORS[p.colorIdx] || PLAYER_COLORS[0] };
  }

  // ═══════════════════════════════════════════════════════════
  // SCREENS
  // ═══════════════════════════════════════════════════════════

  // ── FIREBASE SETUP SCREEN ──────────────────────────────────
  if (!firebaseReady) {
    return (
      <div className="dr noise-bg" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <style>{css}</style>
        <div className="fade-in" style={{width:"100%",maxWidth:440,textAlign:"center"}}>
          <div className="display" style={{fontSize:100,lineHeight:0.85,color:"#e8e8e8",letterSpacing:"-0.02em"}}>DUPE</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8,marginBottom:32}}>
            {[0,1,2].map(i=><div key={i} style={{width:5,height:5,background:"#c8ff00",clipPath:"polygon(50% 0%,100% 50%,50% 100%,0% 50%)"}}/>)}
            <span className="mono" style={{fontSize:10,color:"#444",letterSpacing:"0.2em"}}>ONLINE MULTIPLAYER</span>
            {[0,1,2].map(i=><div key={i} style={{width:5,height:5,background:"#c8ff00",clipPath:"polygon(50% 0%,100% 50%,50% 100%,0% 50%)"}}/>)}
          </div>

          <div style={{background:"#0d0808",border:"1px solid #FF454555",padding:"24px 28px",textAlign:"left"}}>
            <div className="display" style={{fontSize:24,color:"#FF4545",marginBottom:12}}>FIREBASE SETUP REQUIRED</div>
            <div style={{fontSize:13,color:"#888",lineHeight:1.7,marginBottom:16}}>
              {firebaseError}
            </div>
            <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:"16px 18px",marginBottom:16}}>
              <div className="mono" style={{fontSize:10,color:"#c8ff00",letterSpacing:"0.12em",marginBottom:10}}>QUICK STEPS</div>
              {[
                "Go to console.firebase.google.com",
                "Create a project → Add a Web app",
                "Enable Realtime Database (test mode)",
                "Copy your config into this file (line ~36)",
                "Host the file and share the link",
              ].map((step, i) => (
                <div key={i} style={{display:"flex",gap:10,marginBottom:6,alignItems:"flex-start"}}>
                  <span className="mono" style={{fontSize:10,color:"#333",minWidth:18}}>{String(i+1).padStart(2,"0")}</span>
                  <span style={{fontSize:12,color:"#666",lineHeight:1.5}}>{step}</span>
                </div>
              ))}
            </div>
            <div className="mono" style={{fontSize:10,color:"#333",letterSpacing:"0.08em"}}>
              SEE SETUP.md FOR DETAILED INSTRUCTIONS
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── HOME SCREEN ──────────────────────────────────────────
  if (screen === "HOME") {
    return (
      <div className="dr noise-bg" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <style>{css}</style>
        <div className="fade-in" style={{width:"100%",maxWidth:380,textAlign:"center"}}>
          <div className="display" style={{fontSize:120,lineHeight:0.85,color:"#e8e8e8",letterSpacing:"-0.02em"}}>DUPE</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8,marginBottom:40}}>
            {[0,1,2].map(i=><div key={i} style={{width:5,height:5,background:"#c8ff00",clipPath:"polygon(50% 0%,100% 50%,50% 100%,0% 50%)"}}/>)}
            <span className="mono" style={{fontSize:10,color:"#444",letterSpacing:"0.2em"}}>ONLINE MULTIPLAYER</span>
            {[0,1,2].map(i=><div key={i} style={{width:5,height:5,background:"#c8ff00",clipPath:"polygon(50% 0%,100% 50%,50% 100%,0% 50%)"}}/>)}
          </div>

          {/* Name input */}
          <div style={{marginBottom:20}}>
            <SectionLabel>YOUR NAME</SectionLabel>
            <input
              className="input-field"
              value={myName}
              onChange={e => setMyName(e.target.value.slice(0, 8))}
              placeholder="ENTER NAME..."
              style={{textAlign:"center",textTransform:"uppercase"}}
            />
          </div>

          {/* Avatar picker row */}
          <div style={{marginBottom:24}}>
            <SectionLabel>PICK AVATAR</SectionLabel>
            <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>
              {ANIMALS.map(a => {
                const sel = myAnimalId === a.id;
                return (
                  <button key={a.id} onClick={() => setMyAnimalId(a.id)} style={{
                    width:48,height:48,background:sel?"#c8ff0022":"#0d0d0d",
                    border:`1.5px solid ${sel?"#c8ff00":"#222"}`,borderRadius:"50%",
                    cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                    padding:0,transition:"all 0.15s",
                  }}>
                    {a.render(PLAYER_COLORS[myColorIdx].accent, "none", 40)}
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",gap:4,justifyContent:"center"}}>
              {PLAYER_COLORS.map((c, i) => (
                <button key={i} onClick={() => setMyColorIdx(i)} style={{
                  width:24,height:24,background:c.accent,border:`2px solid ${myColorIdx===i?"#fff":"transparent"}`,
                  borderRadius:"50%",cursor:"pointer",transition:"all 0.15s",padding:0,
                }}/>
              ))}
            </div>
          </div>

          {/* Create / Join buttons */}
          <button onClick={createRoom} className="btn-p" style={{padding:"20px 0",fontSize:28,marginBottom:12}}>
            CREATE ROOM
          </button>

          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style={{flex:1,height:1,background:"#1e1e1e"}}/>
            <span className="mono" style={{fontSize:10,color:"#333",letterSpacing:"0.15em"}}>OR JOIN</span>
            <div style={{flex:1,height:1,background:"#1e1e1e"}}/>
          </div>

          <div style={{display:"flex",gap:8}}>
            <input
              className="input-field"
              value={joinCode}
              onChange={e => { setJoinCode(e.target.value.toUpperCase().slice(0,4)); setError(""); }}
              placeholder="ROOM CODE"
              maxLength={4}
              style={{textAlign:"center",fontSize:20,letterSpacing:"0.2em",flex:1}}
            />
            <button onClick={joinRoom} className="btn-p" style={{width:"auto",padding:"14px 24px",fontSize:18}}>JOIN</button>
          </div>

          {error && <div className="mono" style={{color:"#FF4545",fontSize:11,marginTop:12,letterSpacing:"0.08em"}}>{error}</div>}
        </div>
      </div>
    );
  }

  // ── LOBBY ──────────────────────────────────────────────
  if (screen === "LOBBY") {
    const pCount = playerList.length;
    const maxDupes = Math.floor((pCount - 1) / 2);
    return (
      <div className="dr noise-bg" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>
        <style>{css}</style>
        <div className="fade-in" style={{width:"100%",maxWidth:480}}>

          {/* Room code header */}
          <div style={{textAlign:"center",marginBottom:24}}>
            <div className="mono" style={{fontSize:10,color:"#444",letterSpacing:"0.18em",marginBottom:6}}>ROOM CODE</div>
            <div className="display" style={{fontSize:72,color:"#c8ff00",lineHeight:1,letterSpacing:"0.12em"}}>{roomCode}</div>
            <div className="mono" style={{fontSize:10,color:"#333",marginTop:6,letterSpacing:"0.1em"}}>
              SHARE THIS CODE WITH YOUR FRIENDS
            </div>
          </div>

          {/* Players grid */}
          <div style={{background:"#0d0d0d",border:"1px solid #1a1a1a",padding:"16px 20px",marginBottom:16}}>
            <SectionLabel>PLAYERS ({pCount}/8)</SectionLabel>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {playerList.map(p => {
                const dp = getPlayerDisplay(p);
                const isMe = p.id === playerId;
                return (
                  <div key={p.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{position:"relative"}}>
                      <Token p={dp} size={52}/>
                      {isMe && <div style={{position:"absolute",bottom:-2,left:"50%",transform:"translateX(-50%)",
                        background:"#c8ff00",padding:"1px 6px",borderRadius:4}}>
                        <span className="mono" style={{fontSize:7,color:"#080808",letterSpacing:"0.1em"}}>YOU</span>
                      </div>}
                    </div>
                    <span className="mono" style={{fontSize:9,color:dp.color.accent,letterSpacing:"0.05em"}}>{p.name}</span>
                  </div>
                );
              })}
              {/* Empty slots */}
              {Array.from({length: 8 - pCount}, (_, i) => (
                <div key={`empty-${i}`} style={{width:52,height:52,border:"1px dashed #222",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span className="mono" style={{fontSize:10,color:"#222"}}>?</span>
                </div>
              ))}
            </div>
          </div>

          {/* Settings (host only) */}
          {isHost && (
            <div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",padding:"16px 20px",marginBottom:16}}>
              <SectionLabel>GAME SETTINGS</SectionLabel>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {/* Category */}
                <div>
                  <div className="mono" style={{fontSize:9,color:"#444",letterSpacing:"0.1em",marginBottom:6}}>CATEGORY</div>
                  <select value={selectedCategory} onChange={e => setSelectedCategory(e.target.value)}
                    style={{width:"100%",background:"#0d0d0d",border:"1px solid #222",color:"#e8e8e8",padding:"8px 10px",
                    fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer"}}>
                    <option value="ALL">ALL</option>
                    {[...new Set(WORD_PACKS.map(w => w.category))].sort().map(c =>
                      <option key={c} value={c}>{c}</option>
                    )}
                  </select>
                </div>
                {/* Dupes */}
                <div>
                  <div className="mono" style={{fontSize:9,color:"#444",letterSpacing:"0.1em",marginBottom:6}}>DUPES</div>
                  <div style={{display:"flex",gap:4}}>
                    {[1,2,3].map(n => {
                      const disabled = n > maxDupes;
                      return (
                        <button key={n} onClick={() => !disabled && setDupeCount(n)} style={{
                          flex:1,padding:"8px 0",background:dupeCount===n?"#FF4545":"#0d0d0d",
                          color:dupeCount===n?"#fff":disabled?"#2a2a2a":"#555",
                          border:`1px solid ${dupeCount===n?"#FF4545":disabled?"#1a1a1a":"#222"}`,
                          cursor:disabled?"default":"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,
                        }}>{n}</button>
                      );
                    })}
                  </div>
                </div>
                {/* Wrong votes */}
                <div>
                  <div className="mono" style={{fontSize:9,color:"#444",letterSpacing:"0.1em",marginBottom:6}}>WRONG VOTES</div>
                  <div style={{display:"flex",gap:4}}>
                    {[1,2,3,4].map(n => (
                      <button key={n} onClick={() => setMaxWrongSetting(n)} style={{
                        flex:1,padding:"8px 0",background:maxWrongSetting===n?"#c8ff00":"#0d0d0d",
                        color:maxWrongSetting===n?"#080808":"#555",border:`1px solid ${maxWrongSetting===n?"#c8ff00":"#222"}`,
                        cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,
                      }}>{n}</button>
                    ))}
                  </div>
                </div>
                {/* Toggles */}
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <button onClick={() => setHintsOn(!hintsOn)} style={{
                    padding:"8px 0",background:hintsOn?"#42D69322":"#0d0d0d",
                    border:`1px solid ${hintsOn?"#42D693":"#222"}`,color:hintsOn?"#42D693":"#555",
                    cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:"0.08em",
                  }}>{hintsOn ? "HINTS: ON" : "HINTS: OFF"}</button>
                  <button onClick={() => setHardWordsOn(!hardWordsOn)} style={{
                    padding:"8px 0",background:hardWordsOn?"#C879FF22":"#0d0d0d",
                    border:`1px solid ${hardWordsOn?"#C879FF":"#222"}`,color:hardWordsOn?"#C879FF":"#555",
                    cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:"0.08em",
                  }}>{hardWordsOn ? "HARD WORDS: ON" : "EASY ONLY"}</button>
                </div>
              </div>
            </div>
          )}

          {/* Start / Waiting */}
          {isHost ? (
            <button onClick={startGame} disabled={pCount < 3} style={{
              width:"100%",padding:"22px 0",
              background:pCount>=3?"#c8ff00":"#2a2a2a",color:pCount>=3?"#080808":"#555",
              border:"none",cursor:pCount>=3?"pointer":"default",
              fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:"0.08em",
            }}>
              {pCount >= 3 ? "START GAME →" : `NEED ${3 - pCount} MORE PLAYER${3-pCount>1?"S":""}`}
            </button>
          ) : (
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div className="display pulse" style={{fontSize:24,color:"#c8ff00"}}>WAITING FOR HOST</div>
              <div className="mono" style={{fontSize:10,color:"#333",marginTop:6,letterSpacing:"0.1em"}}>
                {pCount} PLAYER{pCount>1?"S":""} IN ROOM
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── ROLE REVEAL ──────────────────────────────────────────
  if (screen === "ROLE_REVEAL") {
    const dp = me ? getPlayerDisplay(me) : null;
    const settings = room.settings || {};
    return (
      <div className="dr noise-bg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        <div className="card-in" style={{width:"100%",maxWidth:360,textAlign:"center"}}>
          {dp && (
            <div style={{
              background: amImposter ? "#0d0808" : "#080f0a",
              border: `1px solid ${amImposter ? "#FF4545" : "#42D693"}`,
              padding: 28,
            }}>
              <Token p={dp} size={80} />
              <div className="display" style={{fontSize:46,color:amImposter?"#FF4545":"#42D693",lineHeight:1,marginTop:16}}>
                {amImposter ? "YOU'RE THE DUPE" : "BRIEFED"}
              </div>
              <div style={{height:1,background:"#1e1e1e",margin:"20px 0"}} />

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:amImposter?14:0}}>
                <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:"14px 16px"}}>
                  <SectionLabel>CATEGORY</SectionLabel>
                  <div className="display" style={{fontSize:22,color:"#e8e8e8"}}>{game.category}</div>
                </div>
                <div style={{background:amImposter?"#150808":"#080808",border:`1px solid ${amImposter?"#3a1515":"#1a1a1a"}`,padding:"14px 16px"}}>
                  <SectionLabel>{amImposter?"YOUR WORD":"THE WORD"}</SectionLabel>
                  <div className="display" style={{fontSize:22,color:amImposter?"#FF4545":"#c8ff00"}}>
                    {amImposter ? (settings.hintsOn ? game.decoy : "???") : game.word}
                  </div>
                </div>
              </div>

              {amImposter && (
                <div style={{background:"#100808",border:"1px dashed #2a1515",padding:"10px 14px",marginBottom:16}}>
                  <div className="mono" style={{fontSize:11,color:"#FF454599",lineHeight:1.6}}>
                    {settings.hintsOn ? "This is NOT their word. Blend in." : "You have no hint. Listen carefully."}
                  </div>
                </div>
              )}

              {!roleReady ? (
                <button className="btn-p" onClick={markReady} style={{padding:"16px 0"}}>
                  GOT IT — READY →
                </button>
              ) : (
                <div style={{padding:"16px 0"}}>
                  <div className="mono pulse" style={{fontSize:11,color:"#444",letterSpacing:"0.12em"}}>
                    WAITING FOR {playerList.filter(p => !p.ready).length} MORE PLAYER{playerList.filter(p=>!p.ready).length!==1?"S":""}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── DISCUSSION ─────────────────────────────────────────
  if (screen === "DISCUSSION") {
    const clueIdx = game.cluePlayer || 0;
    const curPlayer = activePlayers[clueIdx % activePlayers.length];
    const curDP = curPlayer ? getPlayerDisplay(curPlayer) : null;
    const allHadTurn = clueIdx >= activePlayers.length;
    const isMyTurn = curPlayer?.id === playerId;
    const peekWord = amImposter ? (room.settings?.hintsOn ? game.decoy : "???") : game.word;

    return (
      <div className="dr" style={{display:"flex",flexDirection:"column",height:"100dvh",overflow:"hidden"}}>
        <style>{css}</style>

        {/* Header */}
        <div style={{background:"#0a0a0a",borderBottom:"1px solid #1a1a1a",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{display:"flex",gap:4}}>
              {Array.from({length:maxRounds},(_,i)=><Pip key={i} active={i<game.round}/>)}
            </div>
            <div className="display" style={{fontSize:22,lineHeight:1,color:"#e8e8e8"}}>ROUND {game.round}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div className="mono" style={{fontSize:9,color:"#555",letterSpacing:"0.1em"}}>WRONG</div>
            <div className="display" style={{fontSize:22,color:game.wrongVotes>0?"#FF4545":"#e8e8e8"}}>{game.wrongVotes}/{room.settings?.maxWrong||2}</div>
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
          {/* Current turn card */}
          {curDP && (
            <div className="card-in" style={{
              background:curDP.color.bg,border:`1px solid ${curDP.color.accent}`,
              padding:"12px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,
            }}>
              <Token p={curDP} size={52}/>
              <div style={{flex:1}}>
                <div className="mono" style={{fontSize:9,color:"#555",letterSpacing:"0.15em",marginBottom:2}}>
                  {isMyTurn ? "YOUR TURN — SAY A CLUE" : `${curDP.name}'S TURN`}
                </div>
                <div className="display" style={{fontSize:32,color:curDP.color.accent,lineHeight:1}}>
                  {curDP.name}{isMyTurn?" (YOU)":""}
                </div>
                {isMyTurn && (
                  <button onClick={peek} style={{
                    marginTop:6,padding:"3px 10px",background:"transparent",
                    border:`1px solid ${curDP.color.accent}44`,color:curDP.color.accent,
                    cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:"0.08em",
                  }}>
                    {peeking ? (
                      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:"#e8e8e8"}}>{peekWord}</span>
                    ) : "PEEK WORD 👁"}
                  </button>
                )}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                {activePlayers.map((p,i) => {
                  const done = i < (clueIdx % activePlayers.length);
                  const cur2 = i === (clueIdx % activePlayers.length);
                  const dp2 = getPlayerDisplay(p);
                  return <div key={p.id} style={{width:6,height:6,borderRadius:"50%",background:cur2?dp2.color.accent:done?`${dp2.color.accent}55`:"#222",transition:"all 0.2s"}}/>;
                })}
              </div>
            </div>
          )}

          {/* My sus pick */}
          <div style={{background:"#0a0a0a",border:"1px solid #1e1e1e",padding:"8px 12px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div className="mono" style={{fontSize:9,color:"#444",letterSpacing:"0.1em",marginBottom:1}}>YOUR SUS</div>
              <div className="mono" style={{fontSize:10,color:susMap[playerId]?"#FFB830":"#333",letterSpacing:"0.06em"}}>
                {susMap[playerId] ? activePlayers.find(p=>p.id===susMap[playerId])?.name || "—" : "NONE"}
              </div>
            </div>
            <div style={{display:"flex",gap:4}}>
              {activePlayers.filter(p=>p.id!==playerId).map(p=>{
                const sel = susMap[playerId]===p.id;
                const dp2 = getPlayerDisplay(p);
                return (
                  <button key={p.id} onClick={()=>toggleSus(p.id)} style={{
                    padding:"3px 7px",background:sel?dp2.color.bg:"#080808",
                    border:`1px solid ${sel?dp2.color.accent:"#2a2a2a"}`,cursor:"pointer",transition:"all 0.12s",
                  }}>
                    <span className="mono" style={{fontSize:9,color:sel?dp2.color.accent:"#555",letterSpacing:"0.05em"}}>{p.name}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Sus board */}
          <div style={{display:"grid",gridTemplateColumns:`repeat(${activePlayers.length},1fr)`,gap:6,marginBottom:10,padding:"0 4px"}}>
            {activePlayers.map(p => {
              const dp2 = getPlayerDisplay(p);
              const count = susCount(p.id);
              const maxCount = activePlayers.length-1;
              const pct = maxCount>0?count/maxCount:0;
              const isSuspect = pct >= 0.5;
              const isHot = pct >= 0.65;
              const susVoters = activePlayers.filter(src=>susMap[src.id]===p.id);
              const borderCol = isHot?"#FF4545":isSuspect?"#FFB830":animateSus===p.id?dp2.color.accent:"#2a2a2a";
              return (
                <div key={p.id} className={animateSus===p.id?"shake":""} style={{
                  background:"#111",border:`1.5px solid ${borderCol}`,padding:"6px 6px 4px",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:0,
                  position:"relative",transition:"border-color 0.3s",
                  boxShadow:isHot?"0 0 10px #FF454533":isSuspect?"0 0 8px #FFB83033":"none",
                }}>
                  {isSuspect && (
                    <div style={{position:"absolute",top:4,left:0,right:0,display:"flex",justifyContent:"center",zIndex:2,pointerEvents:"none"}}>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:10,letterSpacing:"0.15em",
                        color:isHot?"#FF4545":"#FFB830",border:`1.5px solid ${isHot?"#FF4545":"#FFB830"}`,
                        padding:"0px 4px",lineHeight:1.4,opacity:0.9,transform:"rotate(-8deg)",background:"#111",
                      }}>SUSPECT</div>
                    </div>
                  )}
                  <div style={{marginTop:isSuspect?14:4,marginBottom:4,width:"100%",display:"flex",justifyContent:"center"}}>
                    <Token p={dp2} size={44}/>
                  </div>
                  <div style={{background:"#0a0a0a",width:"100%",textAlign:"center",padding:"3px 4px",marginBottom:3}}>
                    <div className="mono" style={{fontSize:8,color:isHot?"#FF4545":isSuspect?"#FFB830":dp2.color.accent,letterSpacing:"0.08em",lineHeight:1.3}}>
                      {p.name.slice(0,6)}{p.id===playerId?" (YOU)":""}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:2,minHeight:6,justifyContent:"center"}}>
                    {susVoters.map(src=>{
                      const sdp = getPlayerDisplay(src);
                      return <div key={src.id} style={{width:5,height:5,borderRadius:"50%",background:sdp.color.accent}}/>;
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Dupe guess (round 3+) */}
          {amImposter && game.round>=3 && !showGuess && (
            <button onClick={()=>setShowGuess(true)} className="mono" style={{
              width:"100%",background:"transparent",border:"1px dashed #3a1515",
              color:"#FF454566",padding:"9px 0",cursor:"pointer",fontSize:11,
              letterSpacing:"0.08em",marginBottom:10,
            }}>▸ GUESS THE REAL WORD TO WIN INSTANTLY</button>
          )}
          {showGuess && (
            <div className="card-in" style={{background:"#0d0808",border:"1px solid #3a1515",padding:16,marginBottom:10}}>
              <div className="mono" style={{fontSize:10,color:"#FF4545",marginBottom:10,letterSpacing:"0.12em"}}>WHAT IS THE REAL WORD?</div>
              <div style={{display:"flex"}}>
                <input value={imposterGuess} onChange={e=>setImposterGuess(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&tryGuess()}
                  placeholder="TYPE WORD..." className="mono"
                  style={{flex:1,background:"#080808",border:"1px solid #2a1515",borderRight:"none",color:"#e8e8e8",padding:"10px 12px",fontSize:13}}
                />
                <button onClick={tryGuess} className="btn-p" style={{width:"auto",padding:"10px 20px",fontSize:16}}>GO</button>
              </div>
              {guessResult && (
                <div className="mono" style={{marginTop:10,fontSize:11,color:guessResult==="correct"?"#42D693":"#FF4545"}}>
                  {guessResult==="correct"?"✓ CORRECT — DUPE WINS":"✗ WRONG — STAY HIDDEN"}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Bottom buttons */}
        <div style={{padding:16,borderTop:"1px solid #1a1a1a",flexShrink:0,display:"flex",flexDirection:"column",gap:8}}>
          {isMyTurn && (
            <button className="btn-p" onClick={advanceClue} style={{padding:"18px 0",fontSize:20}}>
              DONE — NEXT PLAYER →
            </button>
          )}
          {!isMyTurn && !allHadTurn && (
            <div className="mono pulse" style={{textAlign:"center",padding:"14px 0",fontSize:11,color:"#444",letterSpacing:"0.1em"}}>
              WAITING FOR {curDP?.name} TO GIVE CLUE...
            </div>
          )}
          {allHadTurn && (isHost || isMyTurn) && (
            <button className="btn-p" onClick={callVote} style={{
              padding:"14px 0",background:"transparent",fontSize:16,
              border:"1px solid #c8ff00",color:"#c8ff00",
            }}>
              CALL A VOTE →
            </button>
          )}
          {allHadTurn && !isHost && !isMyTurn && (
            <div className="mono" style={{textAlign:"center",padding:"14px 0",fontSize:11,color:"#444",letterSpacing:"0.1em"}}>
              VOTE AVAILABLE — WAITING FOR HOST
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── VOTE ──────────────────────────────────────────────
  if (screen === "VOTE") {
    const myDP = me ? getPlayerDisplay(me) : null;
    const totalActive = activePlayers.length;
    const votedCount = Object.keys(votes).length;
    return (
      <div className="dr noise-bg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        <div className="card-in" style={{width:"100%",maxWidth:380}}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div className="display" style={{fontSize:42,color:"#c8ff00",lineHeight:1}}>VOTE</div>
            <div className="mono" style={{fontSize:10,color:"#444",letterSpacing:"0.12em",marginTop:6}}>
              {hasVoted ? `${votedCount}/${totalActive} VOTED` : "WHO IS THE DUPE?"}
            </div>
          </div>

          {!hasVoted ? (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {activePlayers.filter(p => p.id !== playerId).map(p => {
                const dp2 = getPlayerDisplay(p);
                return (
                  <button key={p.id} onClick={() => castVote(p.id)} style={{
                    display:"flex",alignItems:"center",gap:14,padding:"12px 16px",
                    background:dp2.color.bg,border:`1px solid ${dp2.color.accent}55`,
                    cursor:"pointer",transition:"all 0.15s",
                  }}>
                    <Token p={dp2} size={44}/>
                    <div className="display" style={{fontSize:24,color:dp2.color.accent,flex:1,textAlign:"left"}}>{p.name}</div>
                    <div className="mono" style={{fontSize:9,color:"#555"}}>
                      {susCount(p.id)>0 ? `${susCount(p.id)} SUS` : ""}
                    </div>
                  </button>
                );
              })}
            </div>
          ) : (
            <div style={{textAlign:"center",padding:"32px 0"}}>
              <div className="display pulse" style={{fontSize:28,color:"#c8ff00"}}>VOTE CAST</div>
              <div className="mono" style={{fontSize:11,color:"#444",marginTop:8,letterSpacing:"0.1em"}}>
                WAITING FOR {totalActive - votedCount} MORE...
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── VOTE RESULT ──────────────────────────────────────────
  if (screen === "VOTE_RESULT") {
    const vr = game.voteResult || {};
    const elimPlayer = playerList.find(p => p.id === vr.eliminatedId);
    const elimDP = elimPlayer ? getPlayerDisplay(elimPlayer) : null;
    return (
      <div className="dr noise-bg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        <div className="card-in" style={{width:"100%",maxWidth:360,textAlign:"center"}}>
          <div style={{background:vr.wasImposter?"#080f0a":"#0d0808",border:`1px solid ${vr.wasImposter?"#42D693":"#FF4545"}`,padding:32}}>
            <div className="display" style={{fontSize:68,color:vr.wasImposter?"#42D693":"#FF4545",lineHeight:1}}>
              {vr.wasImposter?"CAUGHT":"WRONG"}
            </div>
            <div className="display" style={{fontSize:22,color:"#555",marginTop:2}}>
              {vr.wasImposter?"DUPE FOUND":"DUPE STILL AT LARGE"}
            </div>
            <div style={{height:1,background:"#2a1515",margin:"24px 0"}}/>
            {elimDP && <>
              <Token p={elimDP} size={64}/>
              <div className="display" style={{fontSize:30,color:elimDP.color.accent,marginTop:12}}>{elimPlayer.name}</div>
              <div className="mono" style={{fontSize:11,color:"#555",marginTop:4,letterSpacing:"0.12em"}}>
                {vr.wasImposter?"WAS THE DUPE":"WAS INNOCENT"}
              </div>
            </>}
            <div style={{display:"flex",justifyContent:"space-between",background:"#080808",border:"1px solid #2a1515",padding:"12px 16px",margin:"20px 0"}}>
              <span className="mono" style={{fontSize:11,color:"#555",letterSpacing:"0.1em"}}>WRONG VOTES USED</span>
              <span className="mono" style={{fontSize:11,color:"#FF4545"}}>{game.wrongVotes} / {room.settings?.maxWrong||2}</span>
            </div>
            {isHost ? (
              <button className="btn-p" onClick={continueFromVote} style={{padding:"16px 0"}}>CONTINUE →</button>
            ) : (
              <div className="mono pulse" style={{padding:"16px 0",fontSize:11,color:"#444",letterSpacing:"0.1em"}}>
                WAITING FOR HOST...
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── GAME END ─────────────────────────────────────────────
  if (screen === "GAME_END") {
    const win = game.gameResult !== "BRIEFED_WIN";
    const imposterPlayers = playerList.filter(p => imposterIds[p.id]);
    return (
      <div className="dr noise-bg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
        <style>{css}</style>
        <div className="card-in" style={{width:"100%",maxWidth:390}}>
          <div style={{background:win?"#0d0808":"#080f0a",border:`2px solid ${win?"#FF4545":"#42D693"}`,padding:32}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div className="display" style={{fontSize:80,lineHeight:0.9,color:win?"#FF4545":"#42D693"}}>
                {win?"DUPE":"CAUGHT"}
              </div>
              <div className="display" style={{fontSize:28,color:"#444",marginTop:6}}>
                {win?"WINS":"BRIEFED WIN"}
              </div>
              <div className="mono" style={{fontSize:11,color:"#555",marginTop:8,letterSpacing:"0.12em"}}>
                {game.gameResult==="IMPOSTER_WINS_GUESS"&&"DUPE GUESSED THE WORD CORRECTLY"}
                {game.gameResult==="IMPOSTER_WINS_SURVIVAL"&&"DUPE SURVIVED ALL VOTES"}
                {game.gameResult==="BRIEFED_WIN"&&"THE CREW WAS BRIEFED — DUPE EXPOSED"}
              </div>
            </div>
            <div style={{height:1,background:"#2a2a2a",marginBottom:24}}/>
            {imposterPlayers.map(imp => {
              const impDP = getPlayerDisplay(imp);
              return (
                <div key={imp.id} style={{background:"#080808",border:"1px solid #1a1a1a",padding:20,marginBottom:16}}>
                  <SectionLabel>THE DUPE WAS</SectionLabel>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <Token p={impDP} size={60}/>
                    <div>
                      <div className="display" style={{fontSize:34,color:impDP.color.accent,lineHeight:1}}>{imp.name}</div>
                      <div className="mono" style={{fontSize:11,color:"#555",marginTop:4}}>IMPOSTER</div>
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:24}}>
              <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:"14px 16px"}}>
                <SectionLabel>REAL WORD</SectionLabel>
                <div className="display" style={{fontSize:26,color:"#c8ff00"}}>{game.word}</div>
                <div className="mono" style={{fontSize:10,color:"#555",marginTop:2}}>{game.category}</div>
              </div>
              <div style={{background:"#080808",border:"1px solid #1a1a1a",padding:"14px 16px"}}>
                <SectionLabel>DUPE HAD</SectionLabel>
                <div className="display" style={{fontSize:26,color:"#FF4545"}}>{game.decoy}</div>
                <div className="mono" style={{fontSize:10,color:"#555",marginTop:2}}>CLOSE BUT NOT IT</div>
              </div>
            </div>
            {isHost ? (
              <button className="btn-p" onClick={playAgain} style={{padding:"18px 0"}}>PLAY AGAIN</button>
            ) : (
              <div className="mono pulse" style={{textAlign:"center",padding:"18px 0",fontSize:11,color:"#444",letterSpacing:"0.1em"}}>
                WAITING FOR HOST TO START NEXT GAME...
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('game-root')).render(<DupeGame />);
  </script>
</body>
</html>
