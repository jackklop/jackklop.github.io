<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack Siu — Software Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --bg2: #0d0d1a;
      --mint: #00ff87;
      --orange: #ff6b35;
      --blue: #38bdf8;
      --purple: #a78bfa;
      --text: #f0eeff;
      --muted: #7b7a9a;
      --border: rgba(255,255,255,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--mint);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease, opacity 0.15s;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid var(--mint);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.35s ease, width 0.2s, height 0.2s, opacity 0.2s;
      transform: translate(-50%, -50%);
      opacity: 0.5;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 4rem;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(7,7,15,0.95), transparent);
      backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: var(--mint);
    }
    .nav-links { display: flex; gap: 2.5rem; }
    .nav-links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 8rem 4rem 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero-bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
    }
    .hero-bg-shape.s1 { width: 600px; height: 600px; background: var(--mint); top: -200px; right: -100px; }
    .hero-bg-shape.s2 { width: 400px; height: 400px; background: var(--orange); bottom: -100px; left: 200px; }
    .hero-bg-shape.s3 { width: 300px; height: 300px; background: var(--purple); top: 200px; left: -100px; }

    .hero-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--mint);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .hero-tag::before {
      content: '';
      display: block;
      width: 32px; height: 1px;
      background: var(--mint);
    }

    .hero-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(4rem, 10vw, 9rem);
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }
    .hero-name span.accent { color: var(--mint); }
    .hero-name span.accent2 { color: var(--orange); }

    .hero-desc {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.75;
      margin-bottom: 3rem;
      font-weight: 300;
    }

    .hero-cta {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border-radius: 3px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: none;
    }
    .btn-primary {
      background: var(--mint);
      color: #000;
      font-weight: 500;
    }
    .btn-primary:hover { background: #00e87a; transform: translateY(-2px); }
    .btn-secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: transparent;
    }
    .btn-secondary:hover { border-color: var(--mint); color: var(--mint); }

    .hero-scroll {
      position: absolute; bottom: 2.5rem; left: 4rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Sections */
    section {
      padding: 6rem 4rem;
      position: relative;
    }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--orange);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .section-label::after {
      content: '';
      flex: 1; max-width: 60px; height: 1px;
      background: var(--orange);
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 3.5rem;
    }

    /* Skills */
    .skills-section { background: var(--bg2); }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .skill-card {
      background: var(--bg2);
      padding: 2rem;
      transition: background 0.2s;
    }
    .skill-card:hover { background: #111125; }
    .skill-card-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--mint);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .skill-tags {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .skill-tag {
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .project-card {
      background: var(--bg);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      transition: background 0.25s;
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      transition: opacity 0.25s;
      opacity: 0;
    }
    .project-card.c1::before { background: linear-gradient(90deg, var(--mint), var(--blue)); }
    .project-card.c2::before { background: linear-gradient(90deg, var(--orange), var(--purple)); }
    .project-card.c3::before { background: linear-gradient(90deg, var(--purple), var(--mint)); }
    .project-card:hover { background: #0d0d1a; }
    .project-card:hover::before { opacity: 1; }

    .project-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    .project-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    .project-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .project-stack {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .project-stack span {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.25rem 0.6rem;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    .project-stack span.t1 { background: rgba(0,255,135,0.1); color: var(--mint); border: 1px solid rgba(0,255,135,0.2); }
    .project-stack span.t2 { background: rgba(255,107,53,0.1); color: var(--orange); border: 1px solid rgba(255,107,53,0.2); }
    .project-stack span.t3 { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
    .project-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--mint);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 0.4rem;
      transition: gap 0.2s;
    }
    .project-link:hover { gap: 0.7rem; }

    /* Experience */
    .exp-section { background: var(--bg2); }
    .exp-list { display: flex; flex-direction: column; gap: 0; }
    .exp-item {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 3rem;
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .exp-item:first-child { border-top: 1px solid var(--border); }
    .exp-meta {}
    .exp-dates {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }
    .exp-company {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
    }
    .exp-loc {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .exp-content {}
    .exp-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    .exp-bullets {
      list-style: none;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .exp-bullets li {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.65;
      padding-left: 1.2rem;
      position: relative;
    }
    .exp-bullets li::before {
      content: '→';
      position: absolute; left: 0;
      color: var(--orange);
      font-size: 0.75rem;
    }

    /* Contact */
    .contact-section {
      text-align: center;
      padding: 8rem 4rem;
    }
    .contact-email {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 4rem);
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
      display: inline-block;
      position: relative;
      transition: color 0.2s;
    }
    .contact-email::after {
      content: '';
      position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--mint), var(--orange));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }
    .contact-email:hover { color: var(--mint); }
    .contact-email:hover::after { transform: scaleX(1); }

    .social-links {
      display: flex; justify-content: center; gap: 2rem;
      margin-top: 2.5rem;
    }
    .social-links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .social-links a:hover { color: var(--text); }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 4rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    footer span {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Fade-in animation */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .hero, section { padding: 4rem 1.5rem; }
      .exp-item { grid-template-columns: 1fr; gap: 1rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function Cursor() {
      const [pos, setPos] = useState({ x: -100, y: -100 });
      const [ring, setRing] = useState({ x: -100, y: -100 });
      useEffect(() => {
        const move = e => setPos({ x: e.clientX, y: e.clientY });
        const moveRing = e => setTimeout(() => setRing({ x: e.clientX, y: e.clientY }), 80);
        window.addEventListener('mousemove', move);
        window.addEventListener('mousemove', moveRing);
        return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mousemove', moveRing); };
      }, []);
      return <>
        <div className="cursor" style={{ left: pos.x, top: pos.y }} />
        <div className="cursor-ring" style={{ left: ring.x, top: ring.y }} />
      </>;
    }

    function useFadeIn(ref) {
      useEffect(() => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach((e, i) => {
            if (e.isIntersecting) {
              setTimeout(() => e.target.classList.add('visible'), i * 80);
            }
          });
        }, { threshold: 0.1 });
        if (ref.current) {
          const els = ref.current.querySelectorAll('.fade-in');
          els.forEach(el => obs.observe(el));
        }
        return () => obs.disconnect();
      }, []);
    }

    const skills = [
      { label: "Languages", tags: ["Python", "JavaScript", "TypeScript", "Java", "SQL", "Bash", "C#"] },
      { label: "Frontend", tags: ["React", "React Native", "Angular", "HTML/CSS", "jQuery", "Bootstrap"] },
      { label: "Backend & Cloud", tags: ["Kubernetes", "Docker", "Terraform", "REST APIs", "CI/CD", "Linux", "OCI"] },
      { label: "Observability", tags: ["Grafana", "Real-time Pipelines", "Incident Response", "Metrics", "Alerting"] },
    ];

    const projects = [
      {
        num: "01",
        name: "pebbl.",
        desc: "iOS and Android photo booth app with camera filters, sticker overlays, and a freemium subscription model. Shipped to App Store and Google Play with full CI/CD pipeline.",
        stack: ["React Native", "Expo", "CI/CD"],
        link: "https://pebbl-photobooth.carrd.co",
        linkLabel: "View project",
        color: "c1"
      },
      {
        num: "02",
        name: "SmartMaze",
        desc: "Full-stack AI maze solver implementing BFS, A*, Hill Climbing, and Genetic Algorithms. Achieved 10–500% efficiency improvement across multiple algorithm runs.",
        stack: ["Python", "Tkinter", "p5.js", "JavaScript"],
        link: "https://github.com/jackklop",
        linkLabel: "View on GitHub",
        color: "c2"
      },
      {
        num: "03",
        name: "Ticket Automation Engine",
        desc: "Event-driven backend service at Oracle Cloud Infrastructure that auto-creates, routes, and resolves tickets from system events — eliminating 10+ hours of manual work per month.",
        stack: ["Python", "Kubernetes", "Terraform"],
        link: "https://github.com/jackklop",
        linkLabel: "View on GitHub",
        color: "c3"
      },
    ];

    const experience = [
      {
        company: "Oracle Cloud Infrastructure",
        dates: "June 2022 — Present",
        location: "Remote",
        title: "Software Development Engineer, TechOps",
        bullets: [
          "Built event-driven backend service reducing ticket handling from ~30 min to near zero for 20+ tickets/week",
          "Maintained real-time data pipelines streaming incident data to internal consumers across the org",
          "Owned Terraform + Kubernetes infrastructure deployments with full observability stack",
          "Reduced engineer onboarding time by 60–70% through developer tooling automation",
          "On-call rotation: Grafana investigation, incident triage, post-mortems"
        ]
      },
      {
        company: "pebbl.",
        dates: "2024 — Present",
        location: "Remote",
        title: "Founder & Software Development Engineer",
        bullets: [
          "Shipped full-stack iOS/Android app from zero to production on App Store and Google Play",
          "Built freemium model with in-app subscriptions; iterated using analytics and user feedback"
        ]
      },
      {
        company: "CDM Smith",
        dates: "Aug 2020 — May 2022",
        location: "Philadelphia, PA",
        title: "Full Stack Software Engineer",
        bullets: [
          "Built Angular (TypeScript) + Oracle backend apps for government clients",
          "Implemented GeoJSON data pipelines and interactive map visualizations",
          "Maintained PL/SQL data pipelines for sensitive government reporting"
        ]
      },
    ];

    function App() {
      const skillsRef = useRef(); useFadeIn(skillsRef);
      const projectsRef = useRef(); useFadeIn(projectsRef);
      const expRef = useRef(); useFadeIn(expRef);

      return (
        <>
          <Cursor />

          <nav>
            <div className="nav-logo">JS</div>
            <div className="nav-links">
              <a href="#skills">Skills</a>
              <a href="#projects">Projects</a>
              <a href="#experience">Experience</a>
              <a href="#contact">Contact</a>
            </div>
          </nav>

          {/* Hero */}
          <section className="hero">
            <div className="hero-bg-shape s1" />
            <div className="hero-bg-shape s2" />
            <div className="hero-bg-shape s3" />
            <div className="hero-tag">Software Engineer</div>
            <h1 className="hero-name">
              Jack<br />
              <span className="accent">S</span>i<span className="accent2">u</span>
            </h1>
            <p className="hero-desc">
              Backend and full-stack engineer building high-availability distributed systems, real-time data pipelines, and products people actually use.
            </p>
            <div className="hero-cta">
              <a href="#projects" className="btn btn-primary">View Work</a>
              <a href="#contact" className="btn btn-secondary">Get in Touch</a>
            </div>
            <div className="hero-scroll">
              <div className="scroll-line" />
              Scroll
            </div>
          </section>

          {/* Skills */}
          <section id="skills" className="skills-section" ref={skillsRef}>
            <div className="section-label fade-in">What I work with</div>
            <h2 className="section-title fade-in">Tech Stack</h2>
            <div className="skills-grid">
              {skills.map((s, i) => (
                <div className="skill-card fade-in" key={i}>
                  <div className="skill-card-label">{s.label}</div>
                  <div className="skill-tags">
                    {s.tags.map((t, j) => <span className="skill-tag" key={j}>{t}</span>)}
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* Projects */}
          <section id="projects" ref={projectsRef}>
            <div className="section-label fade-in">Selected Work</div>
            <h2 className="section-title fade-in">Projects</h2>
            <div className="projects-grid">
              {projects.map((p, i) => (
                <div className={`project-card fade-in ${p.color}`} key={i}>
                  <div className="project-num">{p.num} —</div>
                  <div className="project-name">{p.name}</div>
                  <p className="project-desc">{p.desc}</p>
                  <div className="project-stack">
                    {p.stack.map((t, j) => (
                      <span key={j} className={`t${(j % 3) + 1}`}>{t}</span>
                    ))}
                  </div>
                  <a href={p.link} target="_blank" rel="noreferrer" className="project-link">
                    {p.linkLabel} →
                  </a>
                </div>
              ))}
            </div>
          </section>

          {/* Experience */}
          <section id="experience" className="exp-section" ref={expRef}>
            <div className="section-label fade-in">Where I've been</div>
            <h2 className="section-title fade-in">Experience</h2>
            <div className="exp-list">
              {experience.map((e, i) => (
                <div className="exp-item fade-in" key={i}>
                  <div className="exp-meta">
                    <div className="exp-dates">{e.dates}</div>
                    <div className="exp-company">{e.company}</div>
                    <div className="exp-loc">{e.location}</div>
                  </div>
                  <div className="exp-content">
                    <div className="exp-title">{e.title}</div>
                    <ul className="exp-bullets">
                      {e.bullets.map((b, j) => <li key={j}>{b}</li>)}
                    </ul>
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* Contact */}
          <section id="contact" className="contact-section">
