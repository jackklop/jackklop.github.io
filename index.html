<body>
  <canvas id="particle-canvas"></canvas>
  <div id="root"></div>
  <script>
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles, mouse = { x: -9999, y: -9999 };
      const COLORS = ['#00ff87','#a78bfa','#38bdf8','#ff6b35'];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      function Particle() {
        this.x = Math.random()*W; this.y = Math.random()*H;
        this.vx = (Math.random()-0.5)*0.4; this.vy = (Math.random()-0.5)*0.4;
        this.r = Math.random()*1.8+0.8;
        this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
        this.baseAlpha = Math.random()*0.4+0.2; this.alpha = this.baseAlpha;
      }
      Particle.prototype.update = function() {
        this.x += this.vx; this.y += this.vy;
        if(this.x<0||this.x>W) this.vx*=-1;
        if(this.y<0||this.y>H) this.vy*=-1;
        const dx=this.x-mouse.x, dy=this.y-mouse.y, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<180) {
          const f=(180-dist)/180;
          this.vx+=(dx/dist)*f*0.08; this.vy+=(dy/dist)*f*0.08;
          this.alpha=Math.min(1,this.baseAlpha+f*0.6);
          const s=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
          if(s>2.5){this.vx*=2.5/s; this.vy*=2.5/s;}
        } else {
          this.alpha+=(this.baseAlpha-this.alpha)*0.05;
          this.vx*=0.995; this.vy*=0.995;
          if(Math.abs(this.vx)<0.1) this.vx+=(Math.random()-0.5)*0.05;
          if(Math.abs(this.vy)<0.1) this.vy+=(Math.random()-0.5)*0.05;
        }
      };
      Particle.prototype.draw = function() {
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle=this.color; ctx.globalAlpha=this.alpha; ctx.fill();
      };
      function init() { resize(); particles=Array.from({length:90},()=>new Particle()); }
      function drawConnections() {
        for(let i=0;i<particles.length;i++) {
          for(let j=i+1;j<particles.length;j++) {
            const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<140) {
              ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y);
              ctx.lineTo(particles[j].x,particles[j].y);
              ctx.strokeStyle='#00ff87'; ctx.globalAlpha=(1-dist/140)*0.25;
              ctx.lineWidth=0.6; ctx.stroke();
            }
          }
          const mdx=particles[i].x-mouse.x, mdy=particles[i].y-mouse.y;
          const md=Math.sqrt(mdx*mdx+mdy*mdy);
          if(md<180) {
            ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y);
            ctx.lineTo(mouse.x,mouse.y);
            ctx.strokeStyle='#00ff87'; ctx.globalAlpha=(1-md/180)*0.5;
            ctx.lineWidth=0.8; ctx.stroke();
          }
        }
      }
      function animate() {
        ctx.clearRect(0,0,W,H);
        drawConnections();
        particles.forEach(p=>{p.update();p.draw();});
        ctx.globalAlpha=1;
        requestAnimationFrame(animate);
      }
      window.addEventListener('resize',resize);
      window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
      window.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});
      init(); animate();
    })();
  </script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function Cursor() {
      const [pos,setPos]=useState({x:-100,y:-100});
      const [ring,setRing]=useState({x:-100,y:-100});
      const [hovering,setHovering]=useState(false);
      useEffect(()=>{
        const move=e=>setPos({x:e.clientX,y:e.clientY});
        const moveRing=e=>setTimeout(()=>setRing({x:e.clientX,y:e.clientY}),60);
        const over=e=>{if(e.target.closest('a,button'))setHovering(true);};
        const out=e=>{if(e.target.closest('a,button'))setHovering(false);};
        window.addEventListener('mousemove',move);
        window.addEventListener('mousemove',moveRing);
        document.addEventListener('mouseover',over);
        document.addEventListener('mouseout',out);
        return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mousemove',moveRing);document.removeEventListener('mouseover',over);document.removeEventListener('mouseout',out);};
      },[]);
      return(<><div className={`cursor${hovering?' hovering':''}`} style={{left:pos.x,top:pos.y}}/><div className={`cursor-ring${hovering?' hovering':''}`} style={{left:ring.x,top:ring.y}}/></>);
    }

    function Typewriter({phrases}) {
      const [display,setDisplay]=useState('');
      const [pi,setPi]=useState(0);
      const [ci,setCi]=useState(0);
      const [del,setDel]=useState(false);
      useEffect(()=>{
        const cur=phrases[pi]; let t;
        if(!del&&ci<cur.length) t=setTimeout(()=>setCi(c=>c+1),60);
        else if(!del&&ci===cur.length) t=setTimeout(()=>setDel(true),2000);
        else if(del&&ci>0) t=setTimeout(()=>setCi(c=>c-1),35);
        else if(del&&ci===0){setDel(false);setPi(i=>(i+1)%phrases.length);}
        setDisplay(cur.slice(0,ci));
        return()=>clearTimeout(t);
      },[ci,del,pi]);
      return(<div className="hero-typewriter">{display}<span className="cursor-blink"/></div>);
    }

    function Counter({target,suffix=''}) {
      const [count,setCount]=useState(0);
      const ref=useRef();
      useEffect(()=>{
        const obs=new IntersectionObserver(entries=>{
          if(entries[0].isIntersecting){
            let s=0; const step=target/50;
            const t=setInterval(()=>{s+=step;if(s>=target){setCount(target);clearInterval(t);}else setCount(Math.floor(s));},30);
            obs.disconnect();
          }
        });
        if(ref.current)obs.observe(ref.current);
        return()=>obs.disconnect();
      },[]);
      return <span ref={ref}>{count}{suffix}</span>;
    }

    function useFadeIn(ref) {
      useEffect(()=>{
        const obs=new IntersectionObserver(entries=>{
          entries.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('visible'),i*80);});
        },{threshold:0.1});
        if(ref.current)ref.current.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
        return()=>obs.disconnect();
      },[]);
    }

      {num:"02",name:"SmartMaze",desc:"Full-stack AI maze solver implementing BFS, A*, Hill Climbing, and Genetic Algorithms. Achieved 10–500% efficiency improvement across multiple algorithm runs.",stack:["Python","Tkinter","p5.js","JavaScript"],link:"https://github.com/jackklop",linkLabel:"View on GitHub",color:"c2"},
